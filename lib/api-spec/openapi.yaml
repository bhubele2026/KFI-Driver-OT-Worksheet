          description: Updated punch
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Punch" }
        "404": { description: Not found }
    delete:
      operationId: deletePunch
      tags: [punches]
      summary: Delete a punch (manual or imported)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "204": { description: Deleted }

  /punches/{id}/reviewed:
    put:
      operationId: setPunchReviewed
      tags: [drivers]
      summary: Mark or unmark a single punch as reviewed
      description: |
        Per-punch review checkbox. Stamps `reviewedBy` / `reviewedAt` (or
        nulls them when `reviewed: false`). Returns the updated punch.
        Rejected with 423 when the driver-week is locked.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reviewed]
              properties:
                reviewed: { type: boolean }
      responses:
        "200":
          description: Updated punch
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Punch" }
        "404": { description: Not found }
        "423": { description: Driver-week is locked }

  /punches/{id}/flag:
    put:
      operationId: setPunchFlagged
      tags: [drivers]
      summary: Flag or unflag a single punch for review
      description: |
        Per-punch red "needs review" flag. Stamps `flaggedBy` /
        `flaggedAt` (or nulls them when `flagged: false`). Flagging a
        punch clears its `reviewed` state — the two are mutually
        exclusive. Returns the updated punch. Rejected with 423 when the
        driver-week is locked.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [flagged]
              properties:
                flagged: { type: boolean }
      responses:
        "200":
          description: Updated punch
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Punch" }
        "404": { description: Not found }
        "423": { description: Driver-week is locked }

  /weeks/{weekStart}/reviewed/{kfiId}:
    put:
      operationId: setReviewed
      tags: [drivers]
      summary: Set the tri-state review status for a driver in a week
      description: |
        Pass either `{ status: 'good' | 'bad' | null }` (preferred) or the
        legacy `{ reviewed: boolean }` (true → good, false → null).
      parameters:
        - $ref: "#/components/parameters/WeekStart"
        - $ref: "#/components/parameters/KfiId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                reviewed: { type: boolean }
                status:
                  type: ["string", "null"]
      responses:
        "200":
          description: New review state
          content:
            application/json:
              schema:
                type: object
                required: [reviewed, status]
                properties:
                  reviewed: { type: boolean }
                  status:
                    type: ["string", "null"]

  /weeks/{weekStart}/drivers/{kfiId}/days/{date}/scale-hours:
    post:
      operationId: scaleDayHours
      tags: [punches]
      summary: |
        Set a per-day total by proportionally scaling each contributing
        punch's `hours` field. Lets the dispatcher type the Connecteam value
        directly on the daily total cell instead of hunting for the off-by-
        a-minute punch. Clock-in / clock-out are preserved; each scaled
        punch is marked `edited=true`. The day's prior `hours` total must be
        > 0 (we can't proportionally scale from zero).
      parameters:
        - $ref: "#/components/parameters/WeekStart"
        - $ref: "#/components/parameters/KfiId"
        - name: date
          in: path
          required: true
          description: Day to scale (YYYY-MM-DD, must be inside the week)
          schema: { type: string, pattern: "^\\d{4}-\\d{2}-\\d{2}$" }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ScaleDayHoursInput" }
      responses:
        "200":
          description: New per-day total after scaling
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DayHoursResult" }
        "400": { description: "Invalid input: no punches, prior total zero, or negative target" }
        "423": { description: Driver-week is locked }

  /weeks/{weekStart}/drivers/{kfiId}/days/{date}/reset-hours:
    post:
      operationId: resetDayHours
      tags: [punches]
      summary: |
        Revert each contributing punch's `hours` field back to the
        engine-derived `diffHours(clockIn, clockOut)` value, undoing a prior
        scale on that day. Clock times and the `edited` flag (which tracks
        clock-edits, not hours-edits) are left untouched.
      parameters:
        - $ref: "#/components/parameters/WeekStart"
        - $ref: "#/components/parameters/KfiId"
        - name: date
          in: path
          required: true
          schema: { type: string, pattern: "^\\d{4}-\\d{2}-\\d{2}$" }
      responses:
        "200":
          description: New per-day total after reset
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DayHoursResult" }
        "400": { description: Invalid input }
        "423": { description: Driver-week is locked }

  /weeks/{weekStart}/drivers/{kfiId}/lock:
    post:
      operationId: lockDriverWeek
      tags: [drivers]
      summary: Lock a driver-week (supervisor or admin only)
      parameters:
        - $ref: "#/components/parameters/WeekStart"
        - $ref: "#/components/parameters/KfiId"
      responses:
        "200":
          description: New lock state
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DriverWeekLockState" }
        "403": { description: Not a supervisor or admin }
    delete:
      operationId: unlockDriverWeek
      tags: [drivers]
      summary: Unlock a driver-week (supervisor or admin only)
      parameters:
        - $ref: "#/components/parameters/WeekStart"
        - $ref: "#/components/parameters/KfiId"
      responses:
        "200":
          description: New lock state
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DriverWeekLockState" }
        "403": { description: Not a supervisor or admin }

  /weeks/{weekStart}/drivers/{kfiId}/notes:
    get:
      operationId: listDriverNotes
      tags: [drivers]
      summary: List notes for a driver-week (newest first, excludes soft-deleted)
      parameters:
        - $ref: "#/components/parameters/WeekStart"
        - $ref: "#/components/parameters/KfiId"
      responses:
        "200":
          description: Notes for this driver-week
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/DriverNote" }
    post:
      operationId: createDriverNote
      tags: [drivers]
      summary: Append a new note to a driver-week (optionally tied to a punch)
      parameters:
        - $ref: "#/components/parameters/WeekStart"
        - $ref: "#/components/parameters/KfiId"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateDriverNoteInput" }
      responses:
        "200":
          description: Created note
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DriverNote" }
        "400": { description: Invalid input }

  /notes/{id}:
    delete:
      operationId: softDeleteDriverNote
      tags: [drivers]
      summary: Soft-delete a note (admin only). The row is kept for audit.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "204": { description: Soft-deleted }
        "403": { description: Admin access required }
        "404": { description: Not found }

  /notes/{id}/restore:
    post:
      operationId: restoreDriverNote
      tags: [drivers]
      summary: Restore a soft-deleted note (admin only). Clears `deleted_at` / `deleted_by_user_id` so the driver-detail page treats the note as live again. Recorded in `user_audit_log` as `restore-note`.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Restored note
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DriverNote" }
        "403": { description: Admin access required }
        "404": { description: Not found }
        "409": { description: Note is not currently soft-deleted }

  /admin/notes/deleted:
    get:
      operationId: listDeletedDriverNotes
      tags: [drivers]
      summary: List soft-deleted driver-week notes (admin only), newest first.
      parameters:
        - name: limit
          in: query
          required: false
          schema: { type: integer, minimum: 1, maximum: 500 }
      responses:
        "200":
          description: Hidden notes with author, hide-actor, and hide-time.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/DeletedDriverNote" }
        "403": { description: Admin access required }

  /admin/notes/hidden-unseen-count:
    get:
      operationId: getHiddenNotesUnseenCount
      tags: [drivers]
      summary: Number of notes hidden since this admin last viewed `/admin/notes`. Drives the "recently hidden" badge.
      responses:
        "200":
          description: Unseen count plus the timestamp the count is computed against.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/HiddenNotesUnseenCount" }
        "403": { description: Admin access required }

  /admin/notes/mark-hidden-seen:
    post:
      operationId: markHiddenNotesSeen
      tags: [drivers]
      summary: Stamp `notes_hidden_last_seen_at = now()` for the requesting admin so the unseen-count badge resets to zero.
      responses:
        "200":
          description: Updated unseen count (always 0 immediately after).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/HiddenNotesUnseenCount" }
        "403": { description: Admin access required }

  /weeks/{weekStart}/drivers/{kfiId}/audit:
    get:
      operationId: getDriverWeekAudit
      tags: [drivers]
      summary: Recent review/lock audit trail for a driver-week
      parameters:
        - $ref: "#/components/parameters/WeekStart"
        - $ref: "#/components/parameters/KfiId"
      responses:
        "200":
          description: Audit entries (newest first, max 50)
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/DriverWeekAuditEntry" }

  /timezones/allowed:
    get:
      operationId: getAllowedTimezones
      tags: [timezones]
      summary: List of IANA timezone strings allowed for per-driver / per-upload overrides.
      responses:
        "200":
          description: Allowed tz list
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AllowedTimezones" }

  /drivers/{kfiId}/timezone:
    patch:
      operationId: updateDriverTimezone
      tags: [timezones]
      summary: Set or clear a driver's display-tz override (`drivers.display_tz`). Supervisor/Admin.
      parameters:
        - $ref: "#/components/parameters/KfiId"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateDriverTimezoneInput" }
      responses:
        "200":
          description: Updated driver record (includes resolved effective tz)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DriverInfo" }
        "400": { description: Invalid tz value }
        "403": { description: Supervisor or admin only }
        "404": { description: Driver not found }

  /weeks/{weekStart}/drivers/{kfiId}/refresh-connecteam:
    post:
      operationId: refreshConnecteamForDriver
      tags: [timezones]
      summary: Re-pull this single driver's Connecteam punches for the week (applies the current `display_tz`). Supervisor/Admin.
      parameters:
        - $ref: "#/components/parameters/WeekStart"
        - $ref: "#/components/parameters/KfiId"
      responses:
        "200":
          description: Refresh result
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RefreshConnecteamDriverResult" }
        "403": { description: Supervisor or admin only }
        "404": { description: Driver not found }
        "502": { description: Upstream Connecteam error }

  /weeks/{weekStart}/drivers/{kfiId}/shift-punches:
    post:
      operationId: shiftDriverWeekPunches
      tags: [timezones]
      summary: Shift this driver-week's punches by `offsetHours` (and optionally restamp `dispTz`) — useful for fixing rows that were ingested in the wrong tz. Supervisor/Admin.
      parameters:
        - $ref: "#/components/parameters/WeekStart"
        - $ref: "#/components/parameters/KfiId"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ShiftPunchesInput" }
      responses:
        "200":
          description: Number of rows shifted
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ShiftPunchesResult" }
        "400": { description: Invalid offset }
        "403": { description: Supervisor or admin only }
        "423": { description: Driver-week is locked }

  /customer-tz-preferences:
    get:
      operationId: listCustomerTzPreferences
      tags: [timezones]
      summary: Per-customer default display-tz preferences plus the canonical KNOWN_CUSTOMERS roster, so the admin page can render a row for every customer (with or without a saved preference). Auth required.
      responses:
        "200":
          description: Preferences and the canonical customer roster
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CustomerTzPreferenceList" }
    put:
      operationId: upsertCustomerTzPreference
      tags: [timezones]
      summary: Set the default display-tz for a customer. Supervisor/Admin.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpsertCustomerTzPreferenceInput" }
      responses:
        "200":
          description: Saved preference
          content:
            application/json:
              schema: { $ref: "#/components/schemas/UpsertCustomerTzPreferenceInput" }
        "400": { description: Invalid input }
        "403": { description: Supervisor or admin only }
    delete:
      operationId: deleteCustomerTzPreference
      tags: [timezones]
      summary: Clear a customer's display-tz preference. Supervisor/Admin.
      parameters:
        - name: customer
          in: query
          required: true
          schema: { type: string }
      responses:
        "204": { description: Deleted (or no-op) }
        "400": { description: customer is required }
        "403": { description: Supervisor or admin only }

  /weeks/{weekStart}/customer-chat/{customer}:
    get:
      operationId: getCustomerUploadChat
      tags: [ingest]
      summary: Fetch (or create) the chat thread for a {week, customer}, including all messages and the customer's active lessons.
      parameters:
        - $ref: "#/components/parameters/WeekStart"
        - name: customer
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Chat thread with messages and active lessons.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CustomerUploadChatThread" }
        "400": { description: Invalid week or customer }

  /weeks/{weekStart}/customer-chat/{customer}/messages:
    post:
      operationId: postCustomerUploadChatMessage
      tags: [ingest]
      summary: Send a user message, run Claude tool loop, return the assistant reply (optionally with a proposed fix + lesson).
      parameters:
        - $ref: "#/components/parameters/WeekStart"
        - name: customer
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PostCustomerUploadChatMessageBody" }
      responses:
        "200":
          description: Assistant reply persisted as a chat message.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CustomerUploadChatMessage" }
        "400": { description: Invalid input or AI extraction unavailable }
        "402": { description: IngestionBudget exceeded }

  /weeks/{weekStart}/customer-chat/{customer}/messages/{messageId}/apply:
    post:
      operationId: applyCustomerUploadChatFix
      tags: [ingest]
      summary: Apply the proposed fix attached to this assistant message; optionally save the proposed lesson.
      parameters:
        - $ref: "#/components/parameters/WeekStart"
        - name: customer
          in: path
          required: true
          schema: { type: string }
        - name: messageId
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ApplyCustomerUploadChatFixBody" }
      responses:
        "200":
          description: Applied. Returns the updated chat message and a summary of what changed.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApplyCustomerUploadChatFixResult" }
        "400": { description: Invalid input or proposed fix is malformed }
        "404": { description: Message not found }
        "409": { description: Already applied or already dismissed }
        "423": { description: One or more affected driver-weeks is locked }

  /weeks/{weekStart}/customer-chat/{customer}/messages/{messageId}/dismiss:
    post:
      operationId: dismissCustomerUploadChatFix
      tags: [ingest]
      summary: Dismiss the proposed fix on this assistant message without applying it.
      parameters:
        - $ref: "#/components/parameters/WeekStart"
        - name: customer
          in: path
          required: true
          schema: { type: string }
        - name: messageId
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Dismissed.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CustomerUploadChatMessage" }
        "404": { description: Message not found }
        "409": { description: Already applied or already dismissed }

  /customer-extraction-lessons/{customer}:
    get:
      operationId: listCustomerExtractionLessons
      tags: [ingest]
      summary: List active and archived extraction lessons for a customer (scoped per-customer).
      parameters:
        - name: customer
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Lessons newest-first.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/CustomerExtractionLesson" }

  /customer-extraction-lessons/{customer}/{lessonId}:
    patch:
      operationId: updateCustomerExtractionLesson
      tags: [ingest]
      summary: Edit a lesson's text or toggle active (admin-only).
      parameters:
        - name: customer
          in: path
          required: true
          schema: { type: string }
        - name: lessonId
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateCustomerExtractionLessonBody" }
      responses:
        "200":
          description: Updated lesson.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CustomerExtractionLesson" }
        "400": { description: Invalid input }
        "403": { description: Admin only }
        "404": { description: Lesson not found }
    delete:
      operationId: deleteCustomerExtractionLesson
      tags: [ingest]
      summary: Permanently delete a lesson (admin-only).
      parameters:
        - name: customer
          in: path
          required: true
          schema: { type: string }
        - name: lessonId
          in: path
          required: true
          schema: { type: integer }
      responses:
        "204": { description: Deleted }
        "403": { description: Admin only }
        "404": { description: Lesson not found }

components:
  parameters:
    WeekStart:
      name: weekStart
      in: path
      required: true
      description: Week start date (Sunday) in YYYY-MM-DD
      schema: { type: string, pattern: "^\\d{4}-\\d{2}-\\d{2}$" }
    KfiId:
      name: kfiId
      in: path
      required: true
      schema: { type: string }
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status: { type: string }

    AuthCredentials:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string, minLength: 8 }

    LoginCredentials:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string, minLength: 1 }

    User:
      type: object
      required: [id, email, createdAt, isAdmin, role, isActive, failedLoginCount, preferredLanguage, hiddenNotesDigestOptIn]
      properties:
        id: { type: integer }
        email: { type: string }
        createdAt: { type: string, format: date-time }
        isAdmin: { type: boolean }
        role:
          type: string
          enum: [reviewer, supervisor]
        isActive: { type: boolean }
        failedLoginCount: { type: integer }
        lockedAt:
          type: ["string", "null"]
          format: date-time
        lastLoginAt:
          type: ["string", "null"]
          format: date-time
        passwordResetLastSentAt:
          type: ["string", "null"]
          format: date-time
          description: When the most recent admin-triggered password-reset email was sent. Drives the per-row Send-reset cooldown countdown in the admin UI.
        preferredLanguage:
          type: string
          description: BCP-47 language tag for the UI ('en' or 'es'). Defaults to 'en'.
        hiddenNotesDigestOptIn:
          type: boolean
          description: Whether this admin receives the daily hidden-notes digest email. Defaults to true; non-admin accounts ignore the flag.

    RegistrationStatus:
      type: object
      required: [openRegistration]
      properties:
        openRegistration: { type: boolean }

    MailerStatus:
      type: object
      required: [configured]
      properties:
        configured: { type: boolean }

    Invite:
      type: object
      required: [id, email, token, createdAt, expiresAt, createdByUserId]
      properties:
        id: { type: integer }
        email: { type: string }
        token: { type: string }
        createdByUserId: { type: integer }
        createdAt: { type: string, format: date-time }
        expiresAt: { type: string, format: date-time }
        usedAt:
          type: ["string", "null"]
          format: date-time
        lastSentAt:
          type: ["string", "null"]
          format: date-time
          description: When this invite was most recently re-emailed. Drives the per-row Resend cooldown countdown in the admin UI.

    InviteWithLink:
      allOf:
        - $ref: "#/components/schemas/Invite"
        - type: object
          required: [acceptUrl]
          properties:
            acceptUrl: { type: string }

    PublicInvite:
      type: object
      required: [email, expiresAt]
      properties:
        email: { type: string }
        expiresAt: { type: string, format: date-time }

    CreateInviteBody:
      type: object
      required: [email]
      properties:
        email: { type: string, format: email }

    AcceptInviteBody:
      type: object
      required: [token, password]
      properties:
        token: { type: string }
        password: { type: string, minLength: 8 }

    RequestPasswordResetBody:
      type: object
      required: [email]
      properties:
        email: { type: string, format: email }

    PasswordResetRequestResult:
      type: object
      required: [ok]
      properties:
        ok: { type: boolean }
        resetUrl:
          type: ["string", "null"]
          description: Only present in non-production environments to aid local testing.

    PublicPasswordReset:
      type: object
      required: [email, expiresAt]
      properties:
        email: { type: string }
        expiresAt: { type: string, format: date-time }

    ResetPasswordBody:
      type: object
      required: [token, password]
      properties:
        token: { type: string }
        password: { type: string, minLength: 8 }

    PasswordResetLink:
      type: object
      required: [resetUrl, expiresAt]
      properties:
        resetUrl: { type: string }
        expiresAt: { type: string, format: date-time }

    EmailDeliveryResult:
      type: object
      required: [delivered]
      properties:
        delivered: { type: boolean }

    ConnecteamTimeClock:
      type: object
      required: [id, name, isArchived]
      properties:
        id: { type: integer }
        name: { type: string }
        isArchived: { type: boolean }
        lastRefreshAt:
          type: ["string", "null"]
          format: date-time
          description: Timestamp of the most recent refresh that touched this clock, or null if never.
        lastWeekStart:
          type: ["string", "null"]
          format: date
          description: weekStart of the most recent refresh that touched this clock.
        lastShiftCount:
          type: ["integer", "null"]
          description: Number of shifts returned by this clock on the most recent refresh.
        lastError:
          type: ["string", "null"]
          description: Error message if the most recent refresh failed on this clock.

    ConnecteamOrphanClockStat:
      type: object
      required: [id, name, lastRefreshAt, lastShiftCount]
      properties:
        id: { type: integer }
        name: { type: string }
        lastRefreshAt: { type: string, format: date-time }
        lastWeekStart:
          type: ["string", "null"]
          format: date
        lastShiftCount: { type: integer }
        lastError:
          type: ["string", "null"]

    ConnecteamClocksAudit:
      type: object
      required: [discovered, orphanStats]
      properties:
        discovered:
          type: array
          items: { $ref: "#/components/schemas/ConnecteamTimeClock" }
        orphanStats:
          type: array
          description: Stats rows for clocks that previously refreshed but are no longer present in the Connecteam account.
          items: { $ref: "#/components/schemas/ConnecteamOrphanClockStat" }

    RateLimitBucket:
      type: object
      required: [name, key, count, max, windowMs, resetAt, blocked]
      properties:
        name: { type: string }
        key: { type: string }
        count: { type: integer }
        max: { type: integer }
        windowMs: { type: integer }
        resetAt: { type: string, format: date-time }
        blocked: { type: boolean }

    RateLimitLockout:
      type: object
      required: [name, key, count, firstBlockedAt, lastBlockedAt]
      properties:
        name: { type: string }
        key: { type: string }
        count:
          type: integer
          description: Number of times this (limiter, key) pair was blocked in the window.
        firstBlockedAt: { type: string, format: date-time }
        lastBlockedAt: { type: string, format: date-time }

    SuggestedIpBlock:
      type: object
      required: [ip, lockoutCount, firstBlockedAt, lastBlockedAt, limiters]
      properties:
        ip: { type: string }
        lockoutCount:
          type: integer
          description: Number of distinct lockout events from this IP across all limiters in the window.
        firstBlockedAt: { type: string, format: date-time }
        lastBlockedAt: { type: string, format: date-time }
        limiters:
          type: array
          items: { type: string }
          description: Distinct limiter names this IP has tripped (e.g. login:ip, auth:request-reset).

    IpBlocklistEntry:
      type: object
      required: [ip, reason, createdAt, createdByEmail]
      properties:
        ip: { type: string }
        reason:
          type: ["string", "null"]
        createdAt: { type: string, format: date-time }
        createdByEmail:
          type: ["string", "null"]

    AddIpBlocklistBody:
      type: object
      required: [ip]
      properties:
        ip:
          type: string
          minLength: 1
          description: A single IPv4/IPv6 address (e.g. `203.0.113.7`) or a CIDR range (e.g. `203.0.113.0/24`, `2001:db8::/32`). Incoming requests matching the entry are rejected.
        reason:
          type: ["string", "null"]

    RateLimitLockoutTimeseriesPoint:
      type: object
      required: [day, name, count]
      properties:
        day:
          type: string
          description: UTC day boundary as `YYYY-MM-DD`.
        name: { type: string }
        count: { type: integer }

    RateLimitLockoutTopOffender:
      type: object
      required: [day, name, key, count, firstBlockedAt, lastBlockedAt]
      properties:
        day:
          type: string
          description: UTC day boundary as `YYYY-MM-DD`.
        name: { type: string }
        key: { type: string }
        count:
          type: integer
          description: Number of times this (limiter, key) pair was blocked on this day.
        firstBlockedAt: { type: string, format: date-time }
        lastBlockedAt: { type: string, format: date-time }

    RemoveIpBlocklistBody:
      type: object
      required: [ip]
      properties:
        ip:
          type: string
          minLength: 1
          description: The exact entry string (single IP or CIDR range) to remove from the blocklist.

    UserAuditLogEntry:
      type: object
      required: [id, action, createdAt]
      properties:
        id: { type: integer }
        action: { type: string }
        createdAt: { type: string, format: date-time }
        actorUserId:
          type: ["integer", "null"]
        actorEmail:
          type: ["string", "null"]
        targetUserId:
          type: ["integer", "null"]
        targetEmail:
          type: ["string", "null"]
        aiSample:
          description: Populated when `action` is `delete-ai-extract-sample`, `pin-ai-extract-sample`, or `unpin-ai-extract-sample`. Parsed from `targetEmail` so the UI can render a friendly label without re-parsing the synthetic string.
          type: ["object", "null"]
          required: [id, customer, fileName, weekStart]
          properties:
            id: { type: integer }
            customer: { type: string }
            fileName: { type: string }
            weekStart: { type: string, format: date }

    UpdateLanguageBody:
      type: object
      required: [preferredLanguage]
      properties:
        preferredLanguage:
          type: string
          enum: [en, es]

    UpdateUserBody:
      type: object
      properties:
        isActive: { type: boolean }
        isAdmin: { type: boolean }
        role:
          type: string
          enum: [reviewer, supervisor]
        locked:
          type: boolean
          description: Set false to clear an account lockout (admin unlock).
        hiddenNotesDigestOptIn:
          type: boolean
          description: Toggle the per-admin hidden-notes daily digest email opt-in. Has no effect for non-admin targets.

    DriverWeekLockState:
      type: object
      required: [locked]
      properties:
        locked: { type: boolean }
        lockedAt:
          type: ["string", "null"]
          format: date-time
        lockedByEmail:
          type: ["string", "null"]

    DriverWeekAuditEntry:
      type: object
      required: [id, action, createdAt]
      properties:
        id: { type: integer }
        action:
          type: string
          enum: [lock, unlock, review-good, review-bad, review-clear]
        createdAt: { type: string, format: date-time }
        actorUserId:
          type: ["integer", "null"]
        actorEmail:
          type: ["string", "null"]

    Week:
      type: object
      required: [startDate, endDate]
      properties:
        startDate: { type: string }
        endDate: { type: string }
        lastRefreshedAt:
          type: ["string", "null"]
          format: date-time
        driverCount: { type: integer }

    DriverInfo:
      type: object
      required: [kfiId, name, customer, isDriver]
      properties:
        kfiId: { type: string }
        name: { type: string }
        customer: { type: string }
        ctUserId:
          type: ["integer", "null"]
        isDriver: { type: boolean }
        displayTz:
          type: ["string", "null"]
          description: Per-driver display-tz override stored on `drivers.display_tz`. Null when no override set; falls back to the IWG hardcode (when applicable) or CT_TZ.
        effectiveDispTz:
          type: ["string", "null"]
          description: Resolved display tz actually used for this driver — `displayTz` if set, otherwise IWG → CT_TZ.

    DriverSummaryRow:
      type: object
      required:
        [
          kfiId,
          name,
          customer,
          driverHours,
          customerHours,
          totalHours,
          regularHours,
          overtimeHours,
          reviewed,
          hasOvertime,
          locked,
          noteCount,
          hasOverriddenDay,
        ]
      properties:
        kfiId: { type: string }
        name: { type: string }
        customer: { type: string }
        driverHours: { type: number }
        customerHours: { type: number }
        totalHours: { type: number }
        regularHours: { type: number }
        overtimeHours: { type: number }
        reviewed: { type: boolean }
        reviewStatus:
          type: ["string", "null"]
          enum: [good, bad, null]
        hasOvertime: { type: boolean }
        locked: { type: boolean }
        lockedByEmail:
          type: ["string", "null"]
        lastTouchedByEmail:
          type: ["string", "null"]
        lastTouchedAt:
          type: ["string", "null"]
          format: date-time
        noteCount:
          type: integer
          description: Number of non-deleted per-punch notes attached to this driver-week. Surfaced as a small badge so a Supervisor can scan for context.
        flaggedPunchCount:
          type: integer
          description: |
            Number of punches in this driver-week with `flagged_for_review =
            true`. Drives a compact red flag badge next to the driver's
            reviewed pill on the week dashboard / sidebar.
        hasOverriddenDay:
          type: boolean
          description: |
            True when at least one day in this driver-week has its total
            dispatcher-overridden (every contributing punch on that day is
            flagged `edited=true`). Drives a small indicator on the driver
            row in the week dashboard.
        hasCustomerTzMismatch:
          type: boolean
          description: |
            True when at least one Customer-source punch on this driver-week
            has a `disp_tz` that differs from the driver's
            `effectiveDispTz`. Drives a small amber Globe indicator on the
            driver row in the week dashboard so a dispatcher can spot a
            timezone disagreement before opening the driver page.
        displayTz:
          type: ["string", "null"]
          description: Per-driver display-tz override stored on `drivers.display_tz`. Null when no override set.
        effectiveDispTz:
          type: ["string", "null"]
          description: Resolved display tz actually used for this driver — `displayTz` if set, otherwise IWG → CT_TZ.
        connecteamParity:
          type: object
          description: |
            Per-driver Connecteam parity status for this week, computed by
            comparing the engine's daily totals against the snapshotted
            Connecteam baseline. Lets the dashboard render the parity badge
            without N extra requests. `match` = every snapshotted day matches
            within 0.005h; `differ` = at least `diffCount` days diverge;
            `unknown` = no baseline yet (week never refreshed).
          required: [status, diffCount]
          properties:
            status:
              type: string
              enum: [match, differ, unknown]
            diffCount:
              type: integer
              description: Number of days that diverge from the Connecteam baseline. Always 0 when status is `match` or `unknown`.
        originalCustomer:
          type: ["string", "null"]
          description: |
            When a per-driver customer override is active, the Connecteam
            roster customer this driver belongs to. `customer` reflects the
            override; `originalCustomer` is shown in the "moved" badge tooltip.
            Null when no override is set.
        overrideSetByEmail:
          type: ["string", "null"]
          description: Email of the dispatcher / admin who set the active override. Null when no override is set.
        overrideSetAt:
          type: ["string", "null"]
          format: date-time
          description: When the active override was last set. Null when no override is set.

    DriverPayrollProfile:
      type: object
      required: [kfiId]
      properties:
        kfiId: { type: string }
        ssn: { type: ["string", "null"] }
        jobId: { type: ["integer", "null"] }
        personId: { type: ["integer", "null"] }
        assignmentId: { type: ["integer", "null"] }
        zenopleCustomer: { type: ["string", "null"] }
        rtPayRate: { type: ["number", "null"] }
        rtBillRate: { type: ["number", "null"] }
        otPayRate: { type: ["number", "null"] }
        otBillRate: { type: ["number", "null"] }
        driverRtPayRate: { type: ["number", "null"] }
        driverRtBillRate: { type: ["number", "null"] }
        driverOtPayRate: { type: ["number", "null"] }
        driverOtBillRate: { type: ["number", "null"] }
        updatedAt: { type: ["string", "null"], format: date-time }
        updatedByEmail: { type: ["string", "null"] }

    UpdateDriverPayrollProfileBody:
      type: object
      properties:
        ssn: { type: ["string", "null"] }
        jobId: { type: ["integer", "null"] }
        personId: { type: ["integer", "null"] }
        assignmentId: { type: ["integer", "null"] }
        zenopleCustomer: { type: ["string", "null"] }
        rtPayRate: { type: ["number", "null"] }
        rtBillRate: { type: ["number", "null"] }
        otPayRate: { type: ["number", "null"] }
        otBillRate: { type: ["number", "null"] }
        driverRtPayRate: { type: ["number", "null"] }
        driverRtBillRate: { type: ["number", "null"] }
        driverOtPayRate: { type: ["number", "null"] }
        driverOtBillRate: { type: ["number", "null"] }

    ZenopleReadiness:
      type: object
      required:
        [
          ready,
          weekEnd,
          ppe,
          driversTotal,
          driversReady,
          unreviewedKfiIds,
          missingProfileKfiIds,
        ]
      properties:
        ready: { type: boolean }
        weekEnd: { type: string }
        ppe: { type: integer }
        driversTotal: { type: integer }
        driversReady: { type: integer }
        unreviewedKfiIds:
          type: array
          items: { type: string }
        missingProfileKfiIds:
          type: array
          items:
            type: object
            required: [kfiId, name, missing]
            properties:
              kfiId: { type: string }
              name: { type: string }
              missing:
                type: array
                items: { type: string }

    WeekSummary:
      type: object
      required:
        [
          startDate,
          endDate,
          totals,
          rows,
          customers,
          lastRefreshedAt,
        ]
      properties:
        startDate: { type: string }
        endDate: { type: string }
        lastRefreshedAt:
          type: ["string", "null"]
          format: date-time
        lastRefreshedByEmail:
          type: ["string", "null"]
        totals:
          type: object
          required:
            [
              activeDrivers,
              driverHours,
              customerHours,
              totalHours,
              regularHours,
              overtimeHours,
              goodCount,
              badCount,
              lockedCount,
            ]
          properties:
            activeDrivers: { type: integer }
            driverHours: { type: number }
            customerHours: { type: number }
            totalHours: { type: number }
            regularHours: { type: number }
            overtimeHours: { type: number }
            goodCount: { type: integer }
            badCount: { type: integer }
            lockedCount: { type: integer }
        rows:
          type: array
          items: { $ref: "#/components/schemas/DriverSummaryRow" }
        customers:
          type: array
          items:
            type: object
            required: [customer, drivers]
            properties:
              customer: { type: string }
              drivers:
                type: array
                items: { $ref: "#/components/schemas/DriverSummaryRow" }

    Punch:
      type: object
      required:
        [
          id,
          weekStart,
          kfiId,
          source,
          date,
          clockIn,
          clockOut,
          hours,
          dispTz,
          isManual,
        ]
      properties:
        id: { type: integer }
        weekStart: { type: string }
        kfiId: { type: string }
        customer:
          type: ["string", "null"]
        source:
          type: string
          enum: [Driver, Customer]
        date: { type: string }
        clockIn: { type: string }
        clockOut: { type: string }
        hours: { type: number }
        payType:
          type: ["string", "null"]
        dispTz: { type: string }
        isManual: { type: boolean }
        edited: { type: boolean }
        createdByEmail:
          type: ["string", "null"]
        updatedByEmail:
          type: ["string", "null"]
        updatedAt:
          type: ["string", "null"]
          format: date-time
        reviewed: { type: boolean }
        reviewedAt:
          type: ["string", "null"]
          format: date-time
        reviewedByEmail:
          type: ["string", "null"]
        flagged:
          type: boolean
          description: |
            True when this punch has been flagged for review (per-punch red
            flag). Mutually exclusive with `reviewed` — flagging clears
            reviewed and vice versa.
        flaggedAt:
          type: ["string", "null"]
          format: date-time
        flaggedByEmail:
          type: ["string", "null"]

    DailyTotals:
      type: object
      required:
        [
          date,
          driverHours,
          customerHours,
          totalHours,
          regularHours,
          overtimeHours,
          hasOverrides,
        ]
      properties:
        date: { type: string }
        driverHours: { type: number }
        customerHours: { type: number }
        totalHours: { type: number }
        regularHours: { type: number }
        overtimeHours: { type: number }
        hasOverrides:
          type: boolean
          description: |
            True when every contributing punch on this day is flagged
            `edited=true` — i.e. the day total was dispatcher-overridden via
            `/days/:date/scale-hours` (which stamps `edited` on every row it
            scales). False for engine-derived totals, including days where
            only some punches were tweaked inline.

    Check:
      type: object
      required: [level, message]
      properties:
        level:
          type: string
          enum: [info, warn, error]
        message: { type: string }
        date:
          type: ["string", "null"]

    DriverWeek:
      type: object
      required:
        [
          driver,
          weekStart,
          endDate,
          punches,
          dailyTotals,
          totals,
          checks,
          reviewed,
        ]
      properties:
        driver: { $ref: "#/components/schemas/DriverInfo" }
        weekStart: { type: string }
        endDate: { type: string }
        punches:
          type: array
          items: { $ref: "#/components/schemas/Punch" }
        dailyTotals:
          type: array
          items: { $ref: "#/components/schemas/DailyTotals" }
        totals:
          type: object
          required:
            [
              driverHours,
              customerHours,
              totalHours,
              regularHours,
              overtimeHours,
              driverRt,
              driverOt,
              custRt,
              custOt,
            ]
          properties:
            driverHours: { type: number }
            customerHours: { type: number }
            totalHours: { type: number }
            regularHours: { type: number }
            overtimeHours: { type: number }
            driverRt: { type: number }
            driverOt: { type: number }
            custRt: { type: number }
            custOt: { type: number }
        checks:
          type: array
          items: { $ref: "#/components/schemas/Check" }
        reviewed: { type: boolean }
        reviewStatus:
          type: ["string", "null"]
          enum: [good, bad, null]
        locked: { type: boolean }
        lockedAt:
          type: ["string", "null"]
          format: date-time
        lockedByEmail:
          type: ["string", "null"]
        customerTzs:
          type: array
          description: |
            Per-customer summary of `disp_tz` values currently persisted on
            this driver-week's Customer-source punches. Drives the per-
            customer tz badges on the driver-detail header so the
            dispatcher can see at a glance when a customer feed is landing
            in a different tz than the driver default.
          items:
            type: object
            required: [customer, dispTz, punchCount, matchesDriver, preferredDispTz]
            properties:
              customer: { type: string }
              dispTz: { type: string }
              punchCount: { type: integer }
              matchesDriver:
                type: boolean
                description: True when this customer feed's `disp_tz` equals the driver's `effectiveDispTz`.
              preferredDispTz:
                type: ["string", "null"]
                description: The customer-level default from `customer_tz_preferences`, if set.
        connecteamParity:
          type: object
          description: |
            Per-day comparison of the engine's daily totals against the
            Connecteam-side daily totals snapshotted at the most recent
            /refresh-connecteam call for this driver-week. `status` is
            `unknown` when no snapshot exists yet (driver-week never
            refreshed), `match` when every snapshotted day reconciles
            within 0.005h, and `differ` otherwise.
          required: [status, diffCount, days]
          properties:
            status:
              type: string
              enum: [match, differ, unknown]
            diffCount: { type: integer }
            lastRefreshedAt:
              type: ["string", "null"]
              format: date-time
            baselineAgeHours:
              type: ["number", "null"]
              description: |
                Hours elapsed since the most recent /refresh-connecteam for
                this week, or null if the week has never been refreshed.
            baselineStale:
              type: boolean
              description: |
                True when the snapshot is older than the staleness threshold
                (default 6h, override via CT_BASELINE_STALE_HOURS). When the
                badge would otherwise be `match`, the UI flips it to a soft
                warning so dispatchers don't trust a stale baseline.
            baselineStaleThresholdHours:
              type: number
            days:
              type: array
              items:
                type: object
                required: [date, dashboardHours, customerHours, connecteamHours, matches]
                properties:
                  date: { type: string }
                  dashboardHours:
                    type: number
                    description: |
                      The dashboard's computed total for this day (Driver
                      punches + Customer-imported punches merged).
                  customerHours:
                    type: number
                    description: Customer-imported hours for this day.
                  connecteamHours:
                    type: ["number", "null"]
                    description: |
                      Connecteam snapshot hours for this day, or null when
                      the driver-week has never been refreshed. After a
                      refresh, days with no recorded Connecteam shift are
                      reported as 0 (not null).
                  matches:
                    type: ["boolean", "null"]
                    description: |
                      True when `|dashboardHours - (connecteamHours +
                      customerHours)| < 0.005`, false when it diverges,
                      and null when there's no Connecteam baseline yet.

    PreviewPunchInput:
      type: object
      required: [kfiId, source, date, clockIn, clockOut]
      description: |
        Draft punch the dispatcher is about to add or edit. Treated as a
        "what-if" — no DB writes happen. When `excludePunchId` is set, the
        existing punch with that id is removed from the punch list before
        the preview is folded in (i.e. inline-edit recompute).
      properties:
        kfiId: { type: string }
        source:
          type: string
          enum: [Driver, Customer]
        customer:
          type: ["string", "null"]
        date: { type: string, pattern: "^\\d{4}-\\d{2}-\\d{2}$" }
        clockIn: { type: string }
        clockOut: { type: string }
        excludePunchId:
          type: ["integer", "null"]
        dispTz:
          type: ["string", "null"]

    PreviewPunchResult:
      type: object
      required:
        [
          normalizedClockIn,
          normalizedClockOut,
          hours,
          dailyTotalAfter,
          weekly,
          overlaps,
          valid,
        ]
      properties:
        valid:
          type: boolean
          description: True when both clock-in and clock-out parsed and clockOut > clockIn.
        invalidReason:
          type: ["string", "null"]
        normalizedClockIn: { type: string }
        normalizedClockOut: { type: string }
        hours: { type: number }
        dailyTotalAfter:
          type: object
          required: [date, driverHours, customerHours, totalHours]
          properties:
            date: { type: string }
            driverHours: { type: number }
            customerHours: { type: number }
            totalHours: { type: number }
        weekly:
          type: object
          required:
            [
              driverHours,
              customerHours,
              totalHours,
              regularHours,
              overtimeHours,
              driverRt,
              driverOt,
              custRt,
              custOt,
            ]
          properties:
            driverHours: { type: number }
            customerHours: { type: number }
            totalHours: { type: number }
            regularHours: { type: number }
            overtimeHours: { type: number }
            driverRt: { type: number }
            driverOt: { type: number }
            custRt: { type: number }
            custOt: { type: number }
        overlaps:
          type: array
          description: |
            Existing same-source punches whose [clockIn, clockOut] window
            intersects the preview by more than 10 minutes. Surfaced as a
            warning in the dialog with a "View overlap" link.
          items:
            type: object
            required: [id, source, date, clockIn, clockOut, overlapMinutes]
            properties:
              id: { type: integer }
              source:
                type: string
                enum: [Driver, Customer]
              date: { type: string }
              clockIn: { type: string }
              clockOut: { type: string }
              overlapMinutes: { type: number }

    ScaleDayHoursInput:
      type: object
      required: [totalHours]
      properties:
        totalHours:
          type: number
          minimum: 0
          description: |
            New per-day total to scale to. Must be >= 0 and <= 24. The
            existing per-punch `hours` values are scaled by
            `totalHours / currentDayTotal`; any rounding residue is folded
            into the largest punch so the sum lands exactly on the target.

    DayHoursResult:
      type: object
      required: [date, totalHours, punches]
      properties:
        date: { type: string }
        totalHours: { type: number }
        punches:
          type: array
          items: { $ref: "#/components/schemas/Punch" }

    ManualPunchInput:
      type: object
      required: [kfiId, source, date, clockIn, clockOut]
      properties:
        kfiId: { type: string }
        source:
          type: string
          enum: [Driver, Customer]
        customer:
          type: ["string", "null"]
        date: { type: string, pattern: "^\\d{4}-\\d{2}-\\d{2}$" }
        clockIn: { type: string }
        clockOut: { type: string }
        payType:
          type: ["string", "null"]
        dispTz:
          type: ["string", "null"]

    EditPunchInput:
      type: object
      description: |
        Edit one punch. If `hours` is supplied it is stored verbatim and
        clock-in/clock-out are NOT used to recompute hours (lets a
        dispatcher correct just the hours total without nudging clock
        times). If `hours` is omitted and clockIn/clockOut change, hours
        is recomputed from the time diff. Edits to one punch never
        affect any other punch.
      properties:
        clockIn:
          type: ["string", "null"]
        clockOut:
          type: ["string", "null"]
        hours:
          type: ["number", "null"]
          minimum: 0
          maximum: 24

    RefreshResult:
      type: object
      required:
        [
          driversFound,
          punchesUpserted,
          refreshedAt,
          clockFailures,
          unresolvedUsers,
          perClock,
        ]
      properties:
        driversFound: { type: integer }
        punchesUpserted: { type: integer }
        refreshedAt: { type: string, format: date-time }
        lockedSkipped:
          type: array
          items: { type: string }
          description: KFI ids of locked drivers whose punches were left untouched.
        clockFailures:
          type: array
          description: Per-clock fetch failures. The refresh succeeds and proceeds with the other clocks; this surfaces what to investigate.
          items: { $ref: "#/components/schemas/RefreshClockFailure" }
        unresolvedUsers:
          type: array
          description: Connecteam userIds that returned shifts but have no matching KFI driver and no alias. Surface as a banner; clicking it should jump to the alias admin page.
          items: { $ref: "#/components/schemas/RefreshUnresolvedUser" }
        perClock:
          type: array
          description: Per-clock shift counts for this refresh.
          items: { $ref: "#/components/schemas/RefreshClockShiftCount" }

    RefreshClockFailure:
      type: object
      required: [clockId, clockName, error]
      properties:
        clockId: { type: integer }
        clockName: { type: string }
        error: { type: string }

    RefreshClockShiftCount:
      type: object
      required: [clockId, clockName, isArchived, shiftCount]
      properties:
        clockId: { type: integer }
        clockName: { type: string }
        isArchived: { type: boolean }
        shiftCount: { type: integer }

    RefreshUnresolvedUser:
      type: object
      required: [ctUserId, shiftCount, clockIds]
      properties:
        ctUserId: { type: integer }
        shiftCount: { type: integer }
        clockIds:
          type: array
          items: { type: integer }

    ResetWeekBody:
      type: object
      required: [scope, confirm]
      properties:
        scope:
          type: string
          enum: [punches-only, punches-and-reviewed, all]
          description: |
            What to wipe. See the route description for exact semantics.
        confirm:
          type: string
          description: |
            Must exactly equal the `weekStart` path parameter. The UI is a
            type-to-confirm dialog; the server re-checks so a malicious
            client can't bypass it.

    ResetDriverCustomerPunchesBody:
      type: object
      required: [confirm]
      properties:
        confirm:
          type: string
          description: |
            Must exactly equal the `kfiId` path parameter. The UI is a
            type-to-confirm dialog; the server re-checks so a malicious
            client can't bypass it.

    ResetDriverCustomerPunchesResult:
      type: object
      required: [weekStart, kfiId, punchesDeleted]
      properties:
        weekStart: { type: string, format: date }
        kfiId: { type: string }
        punchesDeleted: { type: integer }

    RemoveDriverConnecteamTimeBody:
      type: object
      required: [confirm]
      properties:
        confirm:
          type: string
          description: |
            Must exactly equal the `kfiId` path parameter. The UI is a
            type-to-confirm dialog; the server re-checks so a malicious
            client can't bypass it.

    RemoveDriverConnecteamTimeResult:
      type: object
      required: [weekStart, kfiId, punchesDeleted]
      properties:
        weekStart: { type: string, format: date }
        kfiId: { type: string }
        punchesDeleted: { type: integer }

    ResetWeekResult:
      type: object
      required:
        [
          scope,
          weekStart,
          punchesDeleted,
          reviewedDeleted,
          notesSoftDeleted,
          customerUploadAttemptsDeleted,
          snapshotsDeleted,
          weekRefreshCleared,
        ]
      properties:
        scope:
          type: string
          enum: [punches-only, punches-and-reviewed, all]
        weekStart: { type: string, format: date }
        punchesDeleted: { type: integer }
        reviewedDeleted: { type: integer }
        notesSoftDeleted: { type: integer }
        customerUploadAttemptsDeleted: { type: integer }
        snapshotsDeleted: { type: integer }
        weekRefreshCleared:
          type: boolean
          description: True when `weeks.last_refreshed_at/by` was cleared (only on `scope=all`).

    ResetWeekLockedError:
      type: object
      required: [error, lockedKfiIds]
      properties:
        error: { type: string }
        lockedKfiIds:
          type: array
          items: { type: string }
          description: KFI ids of drivers whose week is currently locked.

    UploadResult:
      type: object
      required: [customer, punchesUpserted, fileName, unmappedIds]
      properties:
        customer: { type: string }
        fileName: { type: string }
        punchesUpserted: { type: integer }
        skipped:
          type: boolean
          description: |
            True when the uploaded file's SHA-256 matched the most recent
            successful import for this (week, customer) and the server
            short-circuited without re-parsing or re-writing punches.
            Bulk-upload uses this to render "Already up to date" instead of
            re-importing identical files. Per-row Re-upload bypasses the
            check by sending `?force=1`.
        unmappedIds:
          type: array
          description: |
            Badge / employee IDs that appeared in the uploaded file but could
            not be mapped to a known KFI driver. Surfaced as a non-blocking
            warning so dispatchers know punches were dropped (e.g. a new hire
            who hasn't been added to the mapping yet). `sampleName` carries
            the driver name as it appeared next to the id in the source file
            (when the parser could see one), so admins can recognize who an
            unknown id belongs to without opening the file.
          items:
            $ref: "#/components/schemas/UnmappedId"

    UnmappedId:
      type: object
      required: [id, count, sampleName]
      properties:
        id: { type: string }
        count:
          type: integer
          description: Number of rows in the file that referenced this id and were dropped.
        sampleName:
          type: ["string", "null"]
          description: Driver name as printed next to the id in the source file, when available.
        suggestions:
          type: array
          description: |
            Up to 5 candidate KFI drivers ranked by fuzzy match of `sampleName`
            against the active roster. Used by the upload preview dialog to
            pre-fill a driver picker so dispatchers can map the id on the fly
            and have it remembered via `driver_id_aliases`. Omitted/empty when
            no `sampleName` is available or the roster is empty.
          items:
            type: object
            required: [kfiId, name, confidence]
            properties:
              kfiId: { type: string }
              name: { type: string }
              confidence: { type: number }

    CustomerUploadStatus:
      type: object
      required: [customer, extensions, keywords, punchCount, isAiImported, aiImportWeekCount, aliasCount, lastUnmappedIds, preferredDispTz]
      properties:
        customer: { type: string }
        extensions:
          type: array
          items: { type: string }
        keywords:
          type: array
          items: { type: string }
          description: Lowercase filename substrings that route a file to this customer's parser. Empty for AI-only customers (no deterministic parser yet).
        punchCount: { type: integer }
        isAiImported:
          type: boolean
          description: True when this customer has no deterministic parser and has only ever been imported via the AI extract flow.
        aiImportWeekCount:
          type: integer
          description: Number of distinct weeks this customer has been imported via the AI extract flow (counted across all time). Used to surface promotion candidates.
        aliasCount:
          type: integer
          description: Number of saved driver-name aliases for this customer in `customer_name_aliases`. A growing count is a strong signal that the customer is a recurring weekly run rather than a one-off, and is a good prompt to promote the AI flow to a deterministic parser.
        lastUploadAt:
          type: ["string", "null"]
          format: date-time
        lastFileName:
          type: ["string", "null"]
        lastAttemptAt:
          type: ["string", "null"]
          format: date-time
          description: Timestamp of the most recent upload attempt (success or failure).
        lastSuccessAt:
          type: ["string", "null"]
          format: date-time
          description: Timestamp of the most recent successful upload, if any.
        lastError:
          type: ["string", "null"]
          description: Error message from the last upload attempt, or null if the last attempt succeeded.
        lastSource:
          type: ["string", "null"]
          description: Where the last attempt came from — "parser" (known-customer route) or "ai" (new-customer flow).
        lastSkippedAt:
          type: ["string", "null"]
          format: date-time
          description: |
            Timestamp of the most recent upload attempt that short-circuited
            via the same-hash skip path (bytes matched the previously-imported
            file, server returned `{ skipped: true }` without re-parsing).
            Non-null means the dispatcher's most recent try for this
            (week, customer) was a no-op re-upload of the file that's already
            imported. Cleared on the next real attempt (success or error).
            The dashboard surfaces this as a subtle "Latest file already
            imported" hint on the customer row.
        lastUnmappedIds:
          type: array
          items:
            $ref: "#/components/schemas/UnmappedId"
          description: |
            Badge / employee IDs that appeared in the most recent successful
            upload but didn't map to a known KFI driver. Surfaced as a
            persistent warning under the row so dispatchers don't lose the
            list when refreshing the dashboard. Empty when the last upload
            was clean.
        preferredDispTz:
          type: ["string", "null"]
          description: Saved per-customer display-tz preference (`customer_tz_preferences.display_tz`). Pre-selects the timezone picker on this customer's upload dialog. Null when no preference is set.

    CustomerExtractRow:
      type: object
      required: [index, sourceRow, kfiId, date, clockIn, clockOut, hours]
      properties:
        index:
          type: integer
          description: Stable position in the parser's deterministic output. Pass back in `excludedIndices` on /confirm-customer-file to drop this row.
        sourceRow:
          type: string
          description: Human-readable hint identifying where this row came from in the uploaded file (e.g. `row 3 of Adient.xlsx`). Surfaced in the preview so dispatchers can cross-check against the original document.
        kfiId: { type: string }
        driverName:
          type: ["string", "null"]
        date: { type: string }
        clockIn: { type: string }
        clockOut: { type: string }
        hours: { type: number }
        payType:
          type: ["string", "null"]

    CustomerExtractPreview:
      type: object
      required:
        [
          customer,
          fileName,
          weekStart,
          sampleId,
          rows,
          unmappedIds,
          existingPunchCount,
        ]
      properties:
        customer: { type: string }
        fileName: { type: string }
        weekStart: { type: string }
        skipped:
          type: boolean
          description: |
            True when the uploaded file's SHA-256 matched the most recent
            successful import for this (week, customer) and the server
            short-circuited without parsing or stashing anything. `sampleId`,
            `rows`, `unmappedIds`, and `existingPunchCount` are all empty/zero
            in this case and there is nothing for the caller to confirm.
            Bulk-upload uses this to render "Already up to date" instead of
            walking the dispatcher through a no-op preview.
        sampleId:
          type: ["integer", "null"]
          description: ID of the stashed copy of the uploaded file. Pass back to /confirm-customer-file so the same bytes are re-parsed and committed. Null when `skipped=true`.
        rows:
          type: array
          items: { $ref: "#/components/schemas/CustomerExtractRow" }
        unmappedIds:
          type: array
          items: { $ref: "#/components/schemas/UnmappedId" }
        autoIgnoredIds:
          type: array
          items: { $ref: "#/components/schemas/UnmappedId" }
          description: |
            Badge / employee IDs that the parser would have surfaced as unmapped
            but were silently dropped because a per-customer "not a driver" rule
            in `customer_ignored_externals` matched. Surfaced here so the
            dispatcher knows the file did contain those people and can lift the
            ignore from /admin/customer-ignored-externals if needed.
        existingPunchCount:
          type: integer
          description: Number of existing Customer-source punches for `(week, customer)` that this confirm would actually replace — i.e. excluding manual rows, inline-edited rows, and any rows belonging to a locked driver-week (all of which the wipe preserves).
        extractSource:
          type: string
          enum: [cache, ai]
          description: |
            Which extraction strategy the uniform per-row pipeline used
            (Task #277 removed the legacy hand-written parsers; every
            upload is AI-first now):
            - `cache`: an AI-discovered column-roles row was found and a
              generic role-based reader produced the rows (fast).
            - `ai`: fell through to Gemini extraction (slow, but uniform).
        cacheWritten:
          type: boolean
          description: |
            True only when `extractSource` is `ai` AND the column-roles
            cache row was successfully written for this file's header
            signature. Tells the dispatcher the next upload of the same
            xlsx layout will skip AI entirely and take the fast
            `cache` → `readWithRoles` branch (sub-100ms). Always false
            for cache hits, images, and PDFs (the schema cache is
            xlsx-only today).
        geminiFallbackUsed:
          type: boolean
          description: |
            True when at least one model call in this upload's AI
            extraction was served by the Gemini fallback after the
            primary Claude call failed (Task #297). Opt-in per customer
            via `customers.allowGeminiFallback`. Surfaced so the
            customer-files panel can render an amber "Gemini fallback
            used" badge — these rows should be reviewed more carefully
            than a clean Claude extraction.
        sameAsLastImport:
          type: boolean
          description: |
            True when the uploaded file's SHA-256 matches the most
            recent successful import for this (week, customer) AND
            the caller passed `?force=1` so the server kept extracting
            instead of short-circuiting with `skipped: true`. Set only
            on the per-row Re-upload path (Task #358) — the bulk
            upload path still skips identical bytes without ever
            reaching this flag. The preview dialog uses it to render a
            neutral "matches the last import you confirmed" note so
            the dispatcher knows the re-upload is intentional and
            isn't a regression.

    ConfirmCustomerFileInput:
      type: object
      required: [customer, sampleId]
      properties:
        customer: { type: string, minLength: 1 }
        sampleId: { type: integer }
        dispTz:
          type: ["string", "null"]
          description: |
            Per-upload display-tz override (must be one of `ALLOWED_TZS`).
            Takes precedence over the per-customer default
            (`customer_tz_preferences`) and the per-driver fallback. Silently
            ignored when not a recognized tz.
        excludedIndices:
          type: array
          items: { type: integer, minimum: 0 }
          description: Stable indices from the preview's `rows` array that the dispatcher chose to exclude.
        mapNewAliases:
          type: array
          description: |
            On-the-fly driver-id mappings the dispatcher created in the
            preview's "Unrecognized IDs" picker. Each entry is upserted into
            `driver_id_aliases` inside the same transaction as the punch
            commit, then the file is re-parsed with the merged map so the
            previously-dropped rows are imported in this same run.
          items:
            type: object
            required: [externalId, kfiId]
            properties:
              externalId: { type: string, minLength: 1 }
              kfiId: { type: string, minLength: 1 }
              sampleName:
                type: ["string", "null"]
                description: Driver name as printed on the source doc; stored on the alias row for future audit.
        addToIgnore:
          type: array
          description: |
            On-the-fly "not a driver — never import for this customer" decisions
            made in the preview's unmapped-ids picker. Each entry is upserted
            into `customer_ignored_externals` inside the same transaction as
            the punch commit, so future uploads of this customer's file will
            silently drop these ids instead of nagging the dispatcher.
          items:
            type: object
            required: [externalId]
            properties:
              externalId: { type: string, minLength: 1 }
              sampleName:
                type: ["string", "null"]

    AiExtractedRow:
      type: object
      required: [driverNameOnDoc, date]
      properties:
        driverNameOnDoc: { type: string }
        badgeOrId:
          type: ["string", "null"]
        date: { type: string }
        timeIn:
          type: ["string", "null"]
        timeOut:
          type: ["string", "null"]
        hours:
          type: ["number", "null"]

    DriverMatch:
      type: object
      required: [kfiId, name, customer, confidence]
      properties:
        kfiId: { type: string }
        name: { type: string }
        customer: { type: string }
        confidence: { type: number }

    DriverNameSuggestion:
      type: object
      required: [driverNameOnDoc, matches]
      properties:
        driverNameOnDoc: { type: string }
        badgeOrId:
          type: ["string", "null"]
        savedKfiId:
          type: ["string", "null"]
          description: A previously-saved alias for this (customer, name) pair, if any. The frontend uses it to pre-select the dropdown.
        matches:
          type: array
          items: { $ref: "#/components/schemas/DriverMatch" }

    AiExtractPreview:
      type: object
      required: [customer, weekStart, rows, suggestions, sampleId]
      properties:
        customer: { type: string }
        weekStart: { type: string }
        rows:
          type: array
          items: { $ref: "#/components/schemas/AiExtractedRow" }
        suggestions:
          type: array
          items: { $ref: "#/components/schemas/DriverNameSuggestion" }
        sampleId:
          type: integer
          description: ID of the stashed copy of the uploaded file. Pass back to /confirm-new-customer so the sample is marked confirmed and retained for engineer use.
        extractionTruncated:
          type: boolean
          description: True when chunked AI extraction hit max-chunks; some rows from large files may be missing.
        failedChunks:
          type: integer
          description: Number of per-chunk model calls that never returned valid JSON; those rows are missing from the preview.
        geminiFallbackUsed:
          type: boolean
          description: True when at least one model call was served by the Gemini fallback after a primary Claude failure (Task #297).

    ConfirmNewCustomerRow:
      type: object
      required: [driverNameOnDoc, date, clockIn, clockOut]
      properties:
        driverNameOnDoc: { type: string }
        date: { type: string, pattern: "^\\d{4}-\\d{2}-\\d{2}$" }
        clockIn: { type: string }
        clockOut: { type: string }
        hours:
          type: ["number", "null"]

    ConfirmNewCustomerInput:
      type: object
      required: [customer, mapping, rows]
      properties:
        customer: { type: string, minLength: 1 }
        sampleId:
          type: ["integer", "null"]
          description: ID returned by /extract-new-customer. When provided, the matching stashed file is marked as confirmed (retained 90 days for engineer fixture use).
        mapping:
          type: object
          additionalProperties:
            type: ["string", "null"]
        rows:
          type: array
          items: { $ref: "#/components/schemas/ConfirmNewCustomerRow" }
        dispTz:
          type: ["string", "null"]
          description: Per-upload display-tz override (must be one of `ALLOWED_TZS`). Applied to every imported row in lieu of the per-driver `display_tz` and the IWG/CT fallback. Silently ignored when not recognized.
        excludedIndices:
          type: array
          items: { type: integer, minimum: 0 }
          description: Zero-based indices into `rows` that the dispatcher chose to skip in the preview dialog. Excluded rows are dropped silently and do not count toward `skippedUnmapped`. Out-of-range indices are ignored.

    ConfirmNewCustomerResult:
      type: object
      required: [customer, imported, skippedUnmapped, unmappedNames]
      properties:
        customer: { type: string }
        imported: { type: integer }
        skippedUnmapped: { type: integer }
        unmappedNames:
          type: array
          items: { type: string }

    AiExtractSample:
      type: object
      required:
        [
          id,
          weekStart,
          customer,
          fileName,
          mimeType,
          sizeBytes,
          uploadedAt,
          expiresAt,
          confirmed,
          pinned,
        ]
      properties:
        id: { type: integer }
        weekStart: { type: string }
        customer: { type: string }
        fileName: { type: string }
        mimeType: { type: string }
        sizeBytes: { type: integer }
        uploadedAt: { type: string, format: date-time }
        expiresAt: { type: string, format: date-time }
        confirmedAt:
          type: ["string", "null"]
          format: date-time
        confirmed: { type: boolean }
        pinned: { type: boolean }
        uploadedByEmail:
          type: ["string", "null"]

    CustomerNameAlias:
      type: object
      required: [customer, nameOnDoc, kfiId, updatedAt, weeksUsedCount]
      properties:
        customer: { type: string }
        nameOnDoc: { type: string }
        kfiId: { type: string }
        driverName:
          type: ["string", "null"]
          description: Name from the drivers table for this kfiId, or null if the driver no longer exists.
        driverCustomer:
          type: ["string", "null"]
        driverIsArchived:
          type: ["boolean", "null"]
        updatedAt: { type: string, format: date-time }
        updatedByEmail:
          type: ["string", "null"]
        lastUsedWeek:
          type: ["string", "null"]
          description: Most recent week_start (YYYY-MM-DD) of a Customer-source punch where (customer, kfiId) matches this alias, or null if never seen.
        weeksUsedCount:
          type: integer
          description: Distinct count of week_start values where this alias's (customer, kfiId) appeared in Customer-source punches.

    CustomerNameAliasList:
      type: object
      required: [aliases, drivers]
      properties:
        aliases:
          type: array
          items: { $ref: "#/components/schemas/CustomerNameAlias" }
        drivers:
          type: array
          items: { $ref: "#/components/schemas/DriverInfo" }

    UpdateCustomerNameAliasBody:
      type: object
      required: [kfiId]
      properties:
        kfiId: { type: string, minLength: 1 }

    DriverIdAlias:
      type: object
      required: [externalId, kfiId, createdAt, updatedAt]
      properties:
        externalId: { type: string }
        kfiId: { type: string }
        customer:
          type: ["string", "null"]
          description: Optional context — which customer file this id was first seen in.
        sampleName:
          type: ["string", "null"]
          description: Optional context — sample name-on-doc captured when the alias was created (helps later reviewers recognise it).
        note:
          type: ["string", "null"]
        driverName:
          type: ["string", "null"]
          description: Name from the drivers table for this kfiId, or null if the driver no longer exists.
        driverCustomer:
          type: ["string", "null"]
        driverIsArchived:
          type: ["boolean", "null"]
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        createdByEmail:
          type: ["string", "null"]
        updatedByEmail:
          type: ["string", "null"]

    DriverIdAliasList:
      type: object
      required: [aliases, drivers]
      properties:
        aliases:
          type: array
          items: { $ref: "#/components/schemas/DriverIdAlias" }
        drivers:
          type: array
          items: { $ref: "#/components/schemas/DriverInfo" }

    CreateDriverIdAliasBody:
      type: object
      required: [externalId, kfiId]
      properties:
        externalId: { type: string, minLength: 1 }
        kfiId: { type: string, minLength: 1 }
        customer:
          type: ["string", "null"]
        sampleName:
          type: ["string", "null"]
        note:
          type: ["string", "null"]

    UpdateDriverIdAliasBody:
      type: object
      properties:
        kfiId: { type: string, minLength: 1 }
        customer:
          type: ["string", "null"]
        sampleName:
          type: ["string", "null"]
        note:
          type: ["string", "null"]

    Customer:
      type: object
      required: [id, displayName, filenameKeywords, extensions, active, allowGeminiFallback, sortOrder, createdAt, updatedAt]
      properties:
        id: { type: integer }
        displayName: { type: string }
        filenameKeywords:
          type: array
          items: { type: string }
        extensions:
          type: array
          items: { type: string, enum: [xlsx, pdf] }
        active: { type: boolean }
        allowGeminiFallback:
          type: boolean
          description: |
            Per-customer opt-in for the Claude→Gemini cross-provider
            fallback in AI extraction (Task #297). OFF by default; the
            dispatcher can flip it on per row from /admin/customers when
            a customer's format is stable enough that the fallback's
            extra spend is worth the resilience.
        sortOrder: { type: integer }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        createdByEmail:
          type: ["string", "null"]
        updatedByEmail:
          type: ["string", "null"]

    CreateCustomerBody:
      type: object
      required: [displayName]
      properties:
        displayName: { type: string, minLength: 1 }
        filenameKeywords:
          type: array
          items: { type: string, minLength: 1 }
        extensions:
          type: array
          items: { type: string, enum: [xlsx, pdf] }
        active: { type: boolean }
        allowGeminiFallback: { type: boolean }
        sortOrder: { type: integer }

    UpdateCustomerBody:
      type: object
      properties:
        displayName: { type: string, minLength: 1 }
        filenameKeywords:
          type: array
          items: { type: string, minLength: 1 }
        extensions:
          type: array
          items: { type: string, enum: [xlsx, pdf] }
        active: { type: boolean }
        allowGeminiFallback: { type: boolean }
        sortOrder: { type: integer }

    BootAuditRow:
      type: object
      required:
        [
          id,
          routine,
          outcome,
          rowsAffected,
          startedAt,
          finishedAt,
        ]
      properties:
        id: { type: integer }
        routine: { type: string }
        outcome:
          type: string
          enum: [noop, ok, refused, error]
        rowsAffected: { type: integer }
        startedAt: { type: string, format: date-time }
        finishedAt: { type: string, format: date-time }
        deploymentId:
          type: ["string", "null"]
        gitSha:
          type: ["string", "null"]
        nodeEnv:
          type: ["string", "null"]
        detail:
          type: ["string", "null"]

    IngestionRun:
      type: object
      required:
        [
          id,
          createdAt,
          customer,
          fileName,
          outcome,
          rowCount,
          wallTimeMs,
          totalCalls,
          totalInputTokens,
          totalOutputTokens,
          totalCostUsd,
          geminiFallbackUsed,
          warnedHot,
        ]
      properties:
        id: { type: integer }
        createdAt: { type: string, format: date-time }
        customer: { type: string }
        fileName: { type: string }
        weekStart:
          type: ["string", "null"]
        uploadedByEmail:
          type: ["string", "null"]
        outcome:
          type: string
          enum: [success, budget_exceeded, extraction_failed]
        rowCount: { type: integer }
        wallTimeMs: { type: integer }
        totalCalls: { type: integer }
        totalInputTokens: { type: integer }
        totalOutputTokens: { type: integer }
        totalCostUsd: { type: number }
        pacerWaitMs: { type: integer }
        geminiFallbackUsed: { type: boolean }
        warnedHot: { type: boolean }
        byPurpose:
          type: object
          additionalProperties: true
        byProvider:
          type: object
          additionalProperties: true
        errMsg:
          type: ["string", "null"]
        blockStructured:
          type: ["boolean", "null"]
          description: >
            Task #307: xlsx layout detection. True when the chunker
            saw a block-structured layout (header band repeats per
            driver, e.g. Adient) and halved the per-chunk row budget.
            Null for non-xlsx uploads.
        rowsPerChunk:
          type: ["integer", "null"]
          description: >
            Task #307: per-chunk row cap the xlsx chunker used. 60 for
            block-structured layouts, 120 for flat layouts, null for
            non-xlsx paths.
        maxCalls:
          type: ["integer", "null"]
          description: >
            Task #336: per-upload call ceiling this budget was
            configured with. Right-sized from the planned chunk count
            for xlsx uploads (`(chunks * 2) + 10`, clamped 20..200);
            the static backstop (200) for non-xlsx paths. Null on
            rows written before the column existed.

