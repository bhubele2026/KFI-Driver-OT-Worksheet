      properties:
        customer: { type: string, minLength: 1 }
        externalId: { type: string, minLength: 1 }
        sampleName:
          type: ["string", "null"]
        note:
          type: ["string", "null"]

    DriverNote:
      type: object
      required:
        [
          id,
          weekStart,
          kfiId,
          body,
          authorRole,
          createdAt,
          punchExists,
        ]
      properties:
        id: { type: integer }
        weekStart: { type: string }
        kfiId: { type: string }
        punchId:
          type: ["integer", "null"]
          description: References the punch this note is attached to. Null only on historical week-level notes (no longer creatable; preserved for the admin audit screen). Note that the FK is intentionally denormalized — if the punch is later deleted, this column stays set and the note renders with an "(orphaned punch)" tag so context isn't lost.
        punchExists:
          type: boolean
          description: False when `punchId` is set but the punch row has been deleted. The frontend uses this to render an "(orphaned punch)" tag.
        body: { type: string }
        authorUserId:
          type: ["integer", "null"]
        authorEmail:
          type: ["string", "null"]
        authorRole:
          type: string
          description: Snapshot of the author's role at write-time ("reviewer" / "supervisor" / "admin"). Denormalized so changing the author's role later doesn't retroactively rewrite history.
        createdAt: { type: string, format: date-time }
        lastHiddenAt:
          type: ["string", "null"]
          format: date-time
          description: When this note was most recently soft-deleted, or null if it has never been hidden. Persists across restore so the driver-detail panel can render a "previously hidden by …" audit tag (admin viewers only) on restored notes.
        lastHiddenByEmail:
          type: ["string", "null"]
          description: Email of the admin who most recently hid this note. Persists across restore. Null when the note has never been hidden or the hide-actor's user row has been deleted.

    CreateDriverNoteInput:
      type: object
      required: [body]
      properties:
        body: { type: string, minLength: 1, maxLength: 5000 }
        punchId:
          type: ["integer", "null"]
          description: Required (non-null) — the note must be attached to a specific punch row. The server rejects requests with a null/omitted `punchId` with a 400; week-level notes are no longer supported.

    DeletedDriverNote:
      type: object
      required:
        [
          id,
          weekStart,
          kfiId,
          body,
          authorRole,
          createdAt,
          deletedAt,
          punchExists,
        ]
      properties:
        id: { type: integer }
        weekStart: { type: string }
        kfiId: { type: string }
        punchId:
          type: ["integer", "null"]
        punchExists:
          type: boolean
          description: False when `punchId` is set but the punch row has been deleted.
        body: { type: string }
        authorUserId:
          type: ["integer", "null"]
        authorEmail:
          type: ["string", "null"]
        authorRole:
          type: string
        createdAt: { type: string, format: date-time }
        deletedAt: { type: string, format: date-time }
        deletedByUserId:
          type: ["integer", "null"]
        deletedByEmail:
          type: ["string", "null"]

    HiddenNotesUnseenCount:
      type: object
      required: [count, lastSeenAt]
      properties:
        count:
          type: integer
          description: Number of currently-hidden notes whose `deleted_at` is newer than this admin's `notes_hidden_last_seen_at`. Drives the "recently hidden" badge.
        lastSeenAt:
          type: ["string", "null"]
          format: date-time
          description: When this admin last viewed the hidden-notes page (or null if they never have).

