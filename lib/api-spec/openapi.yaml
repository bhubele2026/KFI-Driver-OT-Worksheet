openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: KFI Driver OT Worksheet API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: auth
  - name: weeks
  - name: drivers
  - name: punches
  - name: ingest
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema: { $ref: "#/components/schemas/HealthStatus" }

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Create the first admin account (only allowed when there are no users yet)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AuthCredentials" }
      responses:
        "200":
          description: Registered and signed in
          content:
            application/json:
              schema: { $ref: "#/components/schemas/User" }
        "400": { description: Invalid input }
        "403": { description: Registration is invite-only }
        "409": { description: Email already taken }

  /auth/registration-status:
    get:
      operationId: getRegistrationStatus
      tags: [auth]
      summary: Whether open registration is allowed (true only when there are zero users)
      responses:
        "200":
          description: Status
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RegistrationStatus" }

  /auth/invites:
    get:
      operationId: listInvites
      tags: [auth]
      summary: List outstanding invites (admin)
      responses:
        "200":
          description: Invites
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Invite" }
        "403": { description: Admin only }
    post:
      operationId: createInvite
      tags: [auth]
      summary: Create an invite link for a new dispatcher (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateInviteBody" }
      responses:
        "200":
          description: Invite created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/InviteWithLink" }
        "400": { description: Invalid input }
        "403": { description: Admin only }
        "409": { description: Email already registered }

  /auth/invites/{token}:
    get:
      operationId: getInvite
      tags: [auth]
      summary: Look up an invite by token (public, used by the accept-invite page)
      parameters:
        - name: token
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Invite details
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PublicInvite" }
        "404": { description: "Invite not found, expired, or already used" }
    delete:
      operationId: revokeInvite
      tags: [auth]
      summary: Revoke an outstanding invite (admin)
      parameters:
        - name: token
          in: path
          required: true
          schema: { type: string }
      responses:
        "204": { description: Revoked }
        "403": { description: Admin only }

  /auth/invites/{token}/resend:
    post:
      operationId: resendInvite
      tags: [auth]
      summary: Re-email an existing invite link to the recipient (admin)
      parameters:
        - name: token
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Email sent
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EmailDeliveryResult" }
        "403": { description: Admin only }
        "404": { description: "Invite not found, expired, or already used" }
        "503": { description: Email is not configured on the server }

  /auth/accept-invite:
    post:
      operationId: acceptInvite
      tags: [auth]
      summary: Create an account using an invite token
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AcceptInviteBody" }
      responses:
        "200":
          description: Account created and signed in
          content:
            application/json:
              schema: { $ref: "#/components/schemas/User" }
        "400": { description: Invalid input }
        "404": { description: "Invite not found, expired, or already used" }

  /auth/request-password-reset:
    post:
      operationId: requestPasswordReset
      tags: [auth]
      summary: Request a password-reset link (always returns 200 to avoid email enumeration)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RequestPasswordResetBody" }
      responses:
        "200":
          description: Request acknowledged
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PasswordResetRequestResult" }

  /auth/password-resets/{token}:
    get:
      operationId: getPasswordReset
      tags: [auth]
      summary: Validate a password-reset token
      parameters:
        - name: token
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Reset details
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PublicPasswordReset" }
        "404": { description: "Token not found, expired, or already used" }

  /auth/reset-password:
    post:
      operationId: resetPassword
      tags: [auth]
      summary: Complete a password reset using a token
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ResetPasswordBody" }
      responses:
        "200":
          description: Password reset and signed in
          content:
            application/json:
              schema: { $ref: "#/components/schemas/User" }
        "400": { description: Invalid input }
        "404": { description: "Token not found, expired, or already used" }

  /auth/mailer-status:
    get:
      operationId: getMailerStatus
      tags: [auth]
      summary: Whether outgoing email (SMTP) is configured (admin)
      responses:
        "200":
          description: Mailer status
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MailerStatus" }
        "403": { description: Admin only }

  /auth/users:
    get:
      operationId: listUsers
      tags: [auth]
      summary: List all dispatcher accounts (admin)
      responses:
        "200":
          description: Users
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/User" }
        "403": { description: Admin only }

  /auth/users/{id}:
    patch:
      operationId: updateUser
      tags: [auth]
      summary: Activate / deactivate a user or grant admin (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateUserBody" }
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema: { $ref: "#/components/schemas/User" }
        "400": { description: Invalid input }
        "403": { description: Admin only }
        "404": { description: User not found }

  /auth/users/{id}/password-reset:
    post:
      operationId: createPasswordResetForUser
      tags: [auth]
      summary: Admin-initiated password reset that returns the link directly (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Reset link
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PasswordResetLink" }
        "403": { description: Admin only }
        "404": { description: User not found }

  /auth/users/{id}/send-password-reset:
    post:
      operationId: sendPasswordResetForUser
      tags: [auth]
      summary: Admin-initiated password reset that emails the link to the user (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Email sent
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EmailDeliveryResult" }
        "403": { description: Admin only }
        "404": { description: User not found }
        "503": { description: Email is not configured on the server }

  /auth/rate-limit-buckets:
    get:
      operationId: listRateLimitBuckets
      tags: [auth]
      summary: List currently-active rate-limit buckets so admins can spot brute-force attempts (admin)
      responses:
        "200":
          description: Active buckets
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/RateLimitBucket" }
        "403": { description: Admin only }

  /auth/rate-limit-events:
    get:
      operationId: listRateLimitEvents
      tags: [auth]
      summary: Recent rate-limit lockouts grouped by (limiter, key) over the last 7 days (admin)
      responses:
        "200":
          description: Recent lockouts (most-recent first)
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/RateLimitLockout" }
        "403": { description: Admin only }

  /auth/rate-limit-events/timeseries:
    get:
      operationId: listRateLimitEventTimeseries
      tags: [auth]
      summary: Daily lockout counts grouped by limiter name (admin)
      parameters:
        - name: days
          in: query
          required: false
          schema: { type: integer, minimum: 1, maximum: 90, default: 7 }
      responses:
        "200":
          description: One row per (day, limiter) in the window, padded with zeros.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/RateLimitLockoutTimeseriesPoint" }
        "403": { description: Admin only }

  /auth/rate-limit-events/top-offenders:
    get:
      operationId: listRateLimitEventTopOffenders
      tags: [auth]
      summary: For each UTC day in the window, the top-N (limiter, key) pairs that drove the lockouts on that day (admin)
      parameters:
        - name: days
          in: query
          required: false
          schema: { type: integer, minimum: 1, maximum: 90, default: 7 }
        - name: perDay
          in: query
          required: false
          schema: { type: integer, minimum: 1, maximum: 20, default: 3 }
      responses:
        "200":
          description: Top offenders per day, ordered most-recent day first then by count desc.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/RateLimitLockoutTopOffender" }
        "403": { description: Admin only }

  /auth/suggested-ip-blocks:
    get:
      operationId: listSuggestedIpBlocks
      tags: [auth]
      summary: IPs that have hit the lockout threshold repeatedly in the last 24h and are not yet blocklisted (admin)
      responses:
        "200":
          description: Suggested IP blocks (most recently active first)
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/SuggestedIpBlock" }
        "403": { description: Admin only }

  /auth/rate-limit-buckets/{name}/{key}:
    delete:
      operationId: clearRateLimitBucket
      tags: [auth]
      summary: Clear a specific rate-limit bucket (admin), e.g. unlock an account or IP
      parameters:
        - name: name
          in: path
          required: true
          schema: { type: string }
        - name: key
          in: path
          required: true
          schema: { type: string }
      responses:
        "204": { description: Cleared }
        "403": { description: Admin only }

  /auth/ip-blocklist:
    get:
      operationId: listIpBlocklist
      tags: [auth]
      summary: List blocklisted IPs (admin)
      responses:
        "200":
          description: Blocklist entries (oldest first)
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/IpBlocklistEntry" }
        "403": { description: Admin only }
    post:
      operationId: addIpBlocklist
      tags: [auth]
      summary: Add an IP or CIDR range to the blocklist (admin). Subsequent requests matching this entry get a 403 before reaching the rate limiter.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AddIpBlocklistBody" }
      responses:
        "200":
          description: Added (or refreshed)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/IpBlocklistEntry" }
        "400": { description: Invalid input or refusing to block caller's own IP }
        "403": { description: Admin only }

  /auth/ip-blocklist/remove:
    post:
      operationId: removeIpBlocklist
      tags: [auth]
      summary: Remove an IP or CIDR range from the blocklist (admin)
      description: Uses POST + body (rather than DELETE on a path param) because CIDR entries contain a forward slash which would otherwise be misinterpreted as a path segment.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RemoveIpBlocklistBody" }
      responses:
        "204": { description: Removed (or no entry existed) }
        "400": { description: Invalid input }
        "403": { description: Admin only }

  /auth/audit-log:
    get:
      operationId: listUserAuditLog
      tags: [auth]
      summary: List recent admin actions on user accounts (admin)
      parameters:
        - name: limit
          in: query
          required: false
          schema: { type: integer, minimum: 1, maximum: 500 }
        - name: targetUserId
          in: query
          required: false
          schema: { type: integer }
      responses:
        "200":
          description: Audit entries (most recent first)
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/UserAuditLogEntry" }
        "403": { description: Admin only }

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Sign in with email & password
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LoginCredentials" }
      responses:
        "200":
          description: Authenticated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/User" }
        "401": { description: Invalid credentials }

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Sign out
      responses:
        "204": { description: Logged out }

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Currently signed-in user (or null)
      responses:
        "200":
          description: Current user, or null if anonymous
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/User"
                  - type: "null"

  /auth/me/language:
    patch:
      operationId: updateMyLanguage
      tags: [auth]
      summary: Update the signed-in user's preferred UI language
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateLanguageBody" }
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema: { $ref: "#/components/schemas/User" }
        "400": { description: Invalid input }
        "401": { description: Not signed in }

  /weeks:
    get:
      operationId: listWeeks
      tags: [weeks]
      summary: List weeks that have ingested data
      responses:
        "200":
          description: List of weeks
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Week" }

  /weeks/{weekStart}/summary:
    get:
      operationId: getWeekSummary
      tags: [weeks]
      summary: Aggregated totals + per-driver rows for a week
      parameters:
        - $ref: "#/components/parameters/WeekStart"
      responses:
        "200":
          description: Week summary
          content:
            application/json:
              schema: { $ref: "#/components/schemas/WeekSummary" }

  /weeks/{weekStart}/drivers/{kfiId}:
    get:
      operationId: getDriverWeek
      tags: [drivers]
      summary: Per-driver punches and totals for a week
      parameters:
        - $ref: "#/components/parameters/WeekStart"
        - $ref: "#/components/parameters/KfiId"
      responses:
        "200":
          description: Driver week detail
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DriverWeek" }
        "404": { description: Driver not found for week }

  /drivers/{kfiId}/payroll-profile:
    get:
      operationId: getDriverPayrollProfile
      tags: [drivers]
      summary: Get the Zenople payroll profile (rates + ids) for a driver
      parameters:
        - $ref: "#/components/parameters/KfiId"
      responses:
        "200":
          description: Driver payroll profile (always returns; fields may be null)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DriverPayrollProfile" }
    patch:
      operationId: updateDriverPayrollProfile
      tags: [drivers]
      summary: Replace the Zenople payroll profile for a driver (admin)
      parameters:
        - $ref: "#/components/parameters/KfiId"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateDriverPayrollProfileBody" }
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DriverPayrollProfile" }
        "400": { description: Invalid input }
        "403": { description: Admin only }
        "404": { description: Driver not found }

  /weeks/{weekStart}/zenople-readiness:
    get:
      operationId: getZenopleReadiness
      tags: [weeks]
      summary: Whether a Zenople export is allowed for this week and why (admin)
      parameters:
        - $ref: "#/components/parameters/WeekStart"
      responses:
        "200":
          description: Readiness report (always 200; `ready=false` carries reasons)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ZenopleReadiness" }
        "403": { description: Admin only }

  /weeks/{weekStart}/zenople-export:
    get:
      operationId: downloadZenopleExport
      tags: [weeks]
      summary: Download the Zenople xlsx for the week (admin). All drivers must be reviewed and have complete profiles.
      parameters:
        - $ref: "#/components/parameters/WeekStart"
      responses:
        "200":
          description: xlsx file stream
          content:
            application/vnd.openxmlformats-officedocument.spreadsheetml.sheet:
              schema: { type: string, format: binary }
        "403": { description: Admin only }
        "409":
          description: Week is not ready for export (see /zenople-readiness for reasons)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ZenopleReadiness" }

  /admin/connecteam/time-clocks-audit:
    get:
      operationId: auditConnecteamTimeClocks
      tags: [ingest]
      summary: List every Connecteam time-clock and flag any that aren't being pulled (admin)
      responses:
        "200":
          description: Audit result
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ConnecteamClocksAudit" }
        "403": { description: Admin only }
        "502": { description: Upstream Connecteam error }

  /weeks/{weekStart}/refresh-connecteam:
    post:
      operationId: refreshConnecteam
      tags: [ingest]
      summary: Pull driver punches for the week from Connecteam
      parameters:
        - $ref: "#/components/parameters/WeekStart"
      responses:
        "200":
          description: Refresh result
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RefreshResult" }
        "502": { description: Upstream Connecteam error }

  /weeks/{weekStart}/reset:
    post:
      operationId: resetWeek
      tags: [ingest]
      summary: Destructive reset of all data for a week (admin)
      description: |
        Admin-only. Wipes data scoped to `(weekStart)` inside a single
        transaction, then publishes a `week-reset` realtime event and
        writes a `user_audit_log` entry. Blocks with 409 if any driver in
        the week is locked — the admin must unlock first.

        Scopes:
          - `punches-only`: hard-delete every row in `punches` for the
            week (manual + imported + Driver + Customer). One row per
            deleted punch is appended to `punch_deletions` so the deletes
            remain attributable.
          - `punches-and-reviewed`: above plus delete every
            `reviewed_drivers` row for the week (clears review status; no
            locked rows exist since the route would have 409'd).
          - `all`: above plus soft-delete every `driver_notes` row for
            the week, wipe `customer_upload_attempts` for the week, wipe
            `connecteam_daily_snapshots` for the week, and clear
            `weeks.last_refreshed_at` / `last_refreshed_by`.

        The `confirm` field must equal the `weekStart` path param exactly
        (the UI uses type-to-confirm) — mismatched values return 400.
      parameters:
        - $ref: "#/components/parameters/WeekStart"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ResetWeekBody" }
      responses:
        "200":
          description: Reset result
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ResetWeekResult" }
        "400": { description: Invalid input or confirm mismatch }
        "403": { description: Admin only }
        "409":
          description: One or more drivers in the week are locked; unlock first
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ResetWeekLockedError" }

  /weeks/{weekStart}/drivers/{kfiId}/reset-customer-punches:
    post:
      operationId: resetDriverCustomerPunches
      tags: [ingest]
      summary: Hard-delete one driver's Customer-source punches for a week (admin)
      description: |
        Admin-only surgical reset. Hard-deletes every row in `punches` for
        `(weekStart, kfiId)` whose `source = 'Customer'` inside a single
        transaction, snapshotting each deleted row into `punch_deletions`
        first so the wipe remains attributable. Driver-source punches are
        left untouched.

        Blocks with 409 if this driver-week is locked — the admin must
        unlock it first.

        The `confirm` field must equal the `kfiId` path param exactly (the
        UI is a type-to-confirm dialog); the server re-checks so a
        malicious client can't bypass it.

        Writes a `user_audit_log` row (`action = 'driver-customer-reset'`)
        and publishes a `driver-customer-reset` realtime event after the
        transaction commits.
      parameters:
        - $ref: "#/components/parameters/WeekStart"
        - $ref: "#/components/parameters/KfiId"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ResetDriverCustomerPunchesBody" }
      responses:
        "200":
          description: Reset result
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ResetDriverCustomerPunchesResult" }
        "400": { description: Invalid input or confirm mismatch }
        "403": { description: Admin only }
        "409":
          description: Driver-week is locked; unlock first
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ResetWeekLockedError" }

  /weeks/{weekStart}/drivers/{kfiId}/remove-connecteam-time:
    post:
      operationId: removeDriverConnecteamTime
      tags: [ingest]
      summary: Hard-delete one driver's Connecteam-source punches for a week (admin)
      description: |
        Admin-only surgical wipe. Hard-deletes every row in `punches` for
        `(weekStart, kfiId)` whose `source = 'Driver' AND isManual =
        false` inside a single transaction, snapshotting each deleted
        row into `punch_deletions` first so the wipe remains
        attributable. Edited Connecteam-imported rows ARE deleted (the
        whole point of this button is to give the dispatcher a clean
        slate so they can re-pull from Connecteam). Manual driver
        entries (`isManual = true`) and Customer-source rows are left
        untouched.

        Blocks with 409 if this driver-week is locked — the admin must
        unlock it first.

        The `confirm` field must equal the `kfiId` path param exactly
        (the UI is a type-to-confirm dialog); the server re-checks so a
        malicious client can't bypass it.

        Writes a `user_audit_log` row (`action =
        'driver-connecteam-remove'`) and publishes a
        `driver-connecteam-remove` realtime event after the transaction
        commits.
      parameters:
        - $ref: "#/components/parameters/WeekStart"
        - $ref: "#/components/parameters/KfiId"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RemoveDriverConnecteamTimeBody" }
      responses:
        "200":
          description: Remove result
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RemoveDriverConnecteamTimeResult" }
        "400": { description: Invalid input or confirm mismatch }
        "403": { description: Admin only }
        "409":
          description: Driver-week is locked; unlock first
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ResetWeekLockedError" }

  /weeks/{weekStart}/extract-customer-file:
    post:
      operationId: extractCustomerFile
      tags: [ingest]
      summary: |
        Parse a known-customer time export (xlsx/pdf, or a photo: jpg/png/heic/webp,
        max 15 MB; HEIC is transcoded to JPEG server-side) into preview rows WITHOUT
        writing anything. Image uploads route through Gemini AI extraction and persist
        their resolved rows on the stashed sample so /confirm-customer-file replays them
        exactly instead of re-running the (non-deterministic) extractor. Stashes the
        uploaded file in `ai_extract_samples` (24h TTL) so /confirm-customer-file can
        replay it on demand. Body is `multipart/form-data` with a single `file` field;
        the frontend builds the FormData manually.
      parameters:
        - $ref: "#/components/parameters/WeekStart"
        - name: maxCalls
          in: query
          required: false
          schema: { type: integer, minimum: 20, maximum: 200 }
          description: >
            Task #356: admin-only per-upload AI call-ceiling override.
            When a previous extract aborted with `IngestionBudgetExceeded`,
            an admin can retry with a higher ceiling (capped at
            `BACKSTOP_MAX_CALLS_PER_UPLOAD=200`). Non-admin callers get
            403; out-of-range values get 400. Every accepted override is
            audited in `user_audit_log` and surfaced on the resulting
            `ingestion_runs` row.
      responses:
        "200":
          description: Parsed preview
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CustomerExtractPreview" }
        "400": { description: Could not detect or parse file }

  /weeks/{weekStart}/confirm-customer-file:
    post:
      operationId: confirmCustomerFile
      tags: [ingest]
      summary: |
        Commit a previously-extracted known-customer upload. Re-parses the stashed
        file by sampleId, drops any rows the dispatcher excluded by index, and runs
        the same wipe-and-reinsert tx as the legacy upload endpoint
        (`(week, source=Customer, customer=X, isManual=false)`).
      parameters:
        - $ref: "#/components/parameters/WeekStart"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ConfirmCustomerFileInput" }
      responses:
        "200":
          description: Ingest result
          content:
            application/json:
              schema: { $ref: "#/components/schemas/UploadResult" }
        "400": { description: Invalid input or stashed sample missing/expired }

  /weeks/{weekStart}/extract-customer-file/{sampleId}:
    delete:
      operationId: discardCustomerExtract
      tags: [ingest]
      summary: |
        Discard a stashed extract preview without committing. Called when
        the dispatcher cancels the preview dialog so the stashed bytes are
        purged immediately instead of waiting for the 24h TTL.
      parameters:
        - $ref: "#/components/parameters/WeekStart"
        - name: sampleId
          in: path
          required: true
          schema: { type: integer }
      responses:
        "204": { description: Discarded (or already gone) }

