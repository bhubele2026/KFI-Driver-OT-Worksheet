          type: ["integer", "null"]
        actorEmail:
          type: ["string", "null"]
        createdAt: { type: string, format: date-time }

    AllowedTimezones:
      type: object
      required: [allowed]
      properties:
        allowed:
          type: array
          items: { type: string }
          description: IANA timezone strings the dispatcher is allowed to pick from. Matches `ALLOWED_TZS` on the server.

    UpdateDriverTimezoneInput:
      type: object
      required: [displayTz]
      properties:
        displayTz:
          type: ["string", "null"]
          description: IANA tz string from `ALLOWED_TZS`, or null to clear the override and fall back to IWG/CT defaults.

    RefreshConnecteamDriverResult:
      type: object
      required: [driversFound, punchesUpserted, refreshedAt]
      properties:
        driversFound: { type: integer }
        punchesUpserted: { type: integer }
        refreshedAt: { type: string, format: date-time }

    ShiftPunchesInput:
      type: object
      required: [offsetHours]
      properties:
        offsetHours:
          type: number
          description: Hours to shift every matching punch by. Positive shifts later; negative shifts earlier. Must be non-zero and within -12..12.
        source:
          type: ["string", "null"]
          enum: [Driver, Customer, null]
          description: When set, only rows from this source are shifted. Otherwise both Driver- and Customer-source rows are shifted.
        customer:
          type: ["string", "null"]
          description: When set (and `source=Customer`), only rows whose `customer` matches this name (case-insensitive) are shifted. Lets the driver-detail "fix this customer's tz" action scope the shift to a single customer-source feed.
        newDispTz:
          type: ["string", "null"]
          description: If provided (and in `ALLOWED_TZS`), every shifted row is also restamped with this tz so future reads agree with the new wall-clock time.

    ShiftPunchesResult:
      type: object
      required: [shifted]
      properties:
        shifted: { type: integer }

    CustomerTzPreference:
      type: object
      required: [customer, displayTz, updatedAt]
