openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: KFI Driver OT Worksheet API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: auth
  - name: weeks
  - name: drivers
  - name: punches
  - name: ingest
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema: { $ref: "#/components/schemas/HealthStatus" }

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Create the first admin account (only allowed when there are no users yet)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AuthCredentials" }
      responses:
        "200":
          description: Registered and signed in
          content:
            application/json:
              schema: { $ref: "#/components/schemas/User" }
        "400": { description: Invalid input }
        "403": { description: Registration is invite-only }
        "409": { description: Email already taken }

  /auth/registration-status:
    get:
      operationId: getRegistrationStatus
      tags: [auth]
      summary: Whether open registration is allowed (true only when there are zero users)
      responses:
        "200":
          description: Status
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RegistrationStatus" }

  /auth/invites:
    get:
      operationId: listInvites
      tags: [auth]
      summary: List outstanding invites (admin)
      responses:
        "200":
          description: Invites
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Invite" }
        "403": { description: Admin only }
    post:
      operationId: createInvite
      tags: [auth]
      summary: Create an invite link for a new dispatcher (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateInviteBody" }
      responses:
        "200":
          description: Invite created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/InviteWithLink" }
        "400": { description: Invalid input }
        "403": { description: Admin only }
        "409": { description: Email already registered }

  /auth/invites/{token}:
    get:
      operationId: getInvite
      tags: [auth]
      summary: Look up an invite by token (public, used by the accept-invite page)
      parameters:
        - name: token
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Invite details
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PublicInvite" }
        "404": { description: "Invite not found, expired, or already used" }
    delete:
      operationId: revokeInvite
      tags: [auth]
      summary: Revoke an outstanding invite (admin)
      parameters:
        - name: token
          in: path
          required: true
          schema: { type: string }
      responses:
        "204": { description: Revoked }
        "403": { description: Admin only }

  /auth/invites/{token}/resend:
    post:
      operationId: resendInvite
      tags: [auth]
      summary: Re-email an existing invite link to the recipient (admin)
      parameters:
        - name: token
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Email sent
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EmailDeliveryResult" }
        "403": { description: Admin only }
        "404": { description: "Invite not found, expired, or already used" }
        "503": { description: Email is not configured on the server }

  /auth/accept-invite:
    post:
      operationId: acceptInvite
      tags: [auth]
      summary: Create an account using an invite token
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AcceptInviteBody" }
      responses:
        "200":
          description: Account created and signed in
          content:
            application/json:
              schema: { $ref: "#/components/schemas/User" }
        "400": { description: Invalid input }
        "404": { description: "Invite not found, expired, or already used" }

  /auth/request-password-reset:
    post:
      operationId: requestPasswordReset
      tags: [auth]
      summary: Request a password-reset link (always returns 200 to avoid email enumeration)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RequestPasswordResetBody" }
      responses:
        "200":
          description: Request acknowledged
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PasswordResetRequestResult" }

  /auth/password-resets/{token}:
    get:
      operationId: getPasswordReset
      tags: [auth]
      summary: Validate a password-reset token
      parameters:
        - name: token
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Reset details
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PublicPasswordReset" }
        "404": { description: "Token not found, expired, or already used" }

  /auth/reset-password:
    post:
      operationId: resetPassword
      tags: [auth]
      summary: Complete a password reset using a token
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ResetPasswordBody" }
      responses:
        "200":
          description: Password reset and signed in
          content:
            application/json:
              schema: { $ref: "#/components/schemas/User" }
        "400": { description: Invalid input }
        "404": { description: "Token not found, expired, or already used" }

  /auth/mailer-status:
    get:
      operationId: getMailerStatus
      tags: [auth]
      summary: Whether outgoing email (SMTP) is configured (admin)
      responses:
        "200":
          description: Mailer status
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MailerStatus" }
        "403": { description: Admin only }

  /auth/users:
    get:
      operationId: listUsers
      tags: [auth]
      summary: List all dispatcher accounts (admin)
      responses:
        "200":
          description: Users
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/User" }
        "403": { description: Admin only }

  /auth/users/{id}:
    patch:
      operationId: updateUser
      tags: [auth]
      summary: Activate / deactivate a user or grant admin (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateUserBody" }
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema: { $ref: "#/components/schemas/User" }
        "400": { description: Invalid input }
        "403": { description: Admin only }
        "404": { description: User not found }

  /auth/users/{id}/password-reset:
    post:
      operationId: createPasswordResetForUser
      tags: [auth]
      summary: Admin-initiated password reset that returns the link directly (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Reset link
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PasswordResetLink" }
        "403": { description: Admin only }
        "404": { description: User not found }

  /auth/users/{id}/send-password-reset:
    post:
      operationId: sendPasswordResetForUser
      tags: [auth]
      summary: Admin-initiated password reset that emails the link to the user (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Email sent
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EmailDeliveryResult" }
        "403": { description: Admin only }
        "404": { description: User not found }
        "503": { description: Email is not configured on the server }

  /auth/rate-limit-buckets:
    get:
      operationId: listRateLimitBuckets
      tags: [auth]
      summary: List currently-active rate-limit buckets so admins can spot brute-force attempts (admin)
      responses:
        "200":
          description: Active buckets
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/RateLimitBucket" }
        "403": { description: Admin only }

  /auth/rate-limit-events:
    get:
      operationId: listRateLimitEvents
      tags: [auth]
      summary: Recent rate-limit lockouts grouped by (limiter, key) over the last 7 days (admin)
      responses:
        "200":
          description: Recent lockouts (most-recent first)
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/RateLimitLockout" }
        "403": { description: Admin only }

  /auth/rate-limit-events/timeseries:
    get:
      operationId: listRateLimitEventTimeseries
      tags: [auth]
      summary: Daily lockout counts grouped by limiter name (admin)
      parameters:
        - name: days
          in: query
          required: false
          schema: { type: integer, minimum: 1, maximum: 90, default: 7 }
      responses:
        "200":
          description: One row per (day, limiter) in the window, padded with zeros.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/RateLimitLockoutTimeseriesPoint" }
        "403": { description: Admin only }

  /auth/rate-limit-events/top-offenders:
    get:
      operationId: listRateLimitEventTopOffenders
      tags: [auth]
      summary: For each UTC day in the window, the top-N (limiter, key) pairs that drove the lockouts on that day (admin)
      parameters:
        - name: days
          in: query
          required: false
          schema: { type: integer, minimum: 1, maximum: 90, default: 7 }
        - name: perDay
          in: query
          required: false
          schema: { type: integer, minimum: 1, maximum: 20, default: 3 }
      responses:
        "200":
          description: Top offenders per day, ordered most-recent day first then by count desc.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/RateLimitLockoutTopOffender" }
        "403": { description: Admin only }

  /auth/suggested-ip-blocks:
    get:
      operationId: listSuggestedIpBlocks
      tags: [auth]
      summary: IPs that have hit the lockout threshold repeatedly in the last 24h and are not yet blocklisted (admin)
      responses:
        "200":
          description: Suggested IP blocks (most recently active first)
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/SuggestedIpBlock" }
        "403": { description: Admin only }

  /auth/rate-limit-buckets/{name}/{key}:
    delete:
      operationId: clearRateLimitBucket
      tags: [auth]
      summary: Clear a specific rate-limit bucket (admin), e.g. unlock an account or IP
      parameters:
        - name: name
          in: path
          required: true
          schema: { type: string }
        - name: key
          in: path
          required: true
          schema: { type: string }
      responses:
        "204": { description: Cleared }
        "403": { description: Admin only }

  /auth/ip-blocklist:
    get:
      operationId: listIpBlocklist
      tags: [auth]
      summary: List blocklisted IPs (admin)
      responses:
        "200":
          description: Blocklist entries (oldest first)
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/IpBlocklistEntry" }
        "403": { description: Admin only }
    post:
      operationId: addIpBlocklist
      tags: [auth]
      summary: Add an IP or CIDR range to the blocklist (admin). Subsequent requests matching this entry get a 403 before reaching the rate limiter.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AddIpBlocklistBody" }
      responses:
        "200":
          description: Added (or refreshed)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/IpBlocklistEntry" }
        "400": { description: Invalid input or refusing to block caller's own IP }
        "403": { description: Admin only }

  /auth/ip-blocklist/remove:
    post:
      operationId: removeIpBlocklist
      tags: [auth]
      summary: Remove an IP or CIDR range from the blocklist (admin)
      description: Uses POST + body (rather than DELETE on a path param) because CIDR entries contain a forward slash which would otherwise be misinterpreted as a path segment.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RemoveIpBlocklistBody" }
      responses:
        "204": { description: Removed (or no entry existed) }
        "400": { description: Invalid input }
        "403": { description: Admin only }

  /auth/audit-log:
    get:
      operationId: listUserAuditLog
      tags: [auth]
      summary: List recent admin actions on user accounts (admin)
      parameters:
        - name: limit
          in: query
          required: false
          schema: { type: integer, minimum: 1, maximum: 500 }
        - name: targetUserId
          in: query
          required: false
          schema: { type: integer }
      responses:
        "200":
          description: Audit entries (most recent first)
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/UserAuditLogEntry" }
        "403": { description: Admin only }

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Sign in with email & password
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LoginCredentials" }
      responses:
        "200":
          description: Authenticated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/User" }
        "401": { description: Invalid credentials }

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Sign out
      responses:
        "204": { description: Logged out }

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Currently signed-in user (or null)
      responses:
        "200":
          description: Current user, or null if anonymous
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/User"
                  - type: "null"

  /auth/me/language:
    patch:
      operationId: updateMyLanguage
      tags: [auth]
      summary: Update the signed-in user's preferred UI language
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateLanguageBody" }
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema: { $ref: "#/components/schemas/User" }
        "400": { description: Invalid input }
        "401": { description: Not signed in }

  /weeks:
    get:
      operationId: listWeeks
      tags: [weeks]
      summary: List weeks that have ingested data
      responses:
        "200":
          description: List of weeks
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Week" }

  /weeks/{weekStart}/summary:
    get:
      operationId: getWeekSummary
      tags: [weeks]
      summary: Aggregated totals + per-driver rows for a week
      parameters:
        - $ref: "#/components/parameters/WeekStart"
      responses:
        "200":
          description: Week summary
          content:
            application/json:
              schema: { $ref: "#/components/schemas/WeekSummary" }

  /weeks/{weekStart}/drivers/{kfiId}:
    get:
      operationId: getDriverWeek
      tags: [drivers]
      summary: Per-driver punches and totals for a week
      parameters:
        - $ref: "#/components/parameters/WeekStart"
        - $ref: "#/components/parameters/KfiId"
      responses:
        "200":
          description: Driver week detail
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DriverWeek" }
        "404": { description: Driver not found for week }

  /admin/connecteam/time-clocks-audit:
    get:
      operationId: auditConnecteamTimeClocks
      tags: [ingest]
      summary: List every Connecteam time-clock and flag any that aren't being pulled (admin)
      responses:
        "200":
          description: Audit result
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ConnecteamClocksAudit" }
        "403": { description: Admin only }
        "502": { description: Upstream Connecteam error }

  /weeks/{weekStart}/refresh-connecteam:
    post:
      operationId: refreshConnecteam
      tags: [ingest]
      summary: Pull driver punches for the week from Connecteam
      parameters:
        - $ref: "#/components/parameters/WeekStart"
      responses:
        "200":
          description: Refresh result
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RefreshResult" }
        "502": { description: Upstream Connecteam error }

  /weeks/{weekStart}/upload-customer-file:
    post:
      operationId: uploadCustomerFile
      tags: [ingest]
      summary: |
        DEPRECATED. Upload a known-customer time export (xlsx/pdf) and write punches in a single round-trip.
        The dashboard now uses the two-step extract/confirm flow below so dispatchers can preview before saving.
        Kept for back-compat; new callers should not use it.
      parameters:
        - $ref: "#/components/parameters/WeekStart"
      responses:
        "200":
          description: Ingest result
          content:
            application/json:
              schema: { $ref: "#/components/schemas/UploadResult" }
        "400": { description: Could not detect or parse file }

  /weeks/{weekStart}/extract-customer-file:
    post:
      operationId: extractCustomerFile
      tags: [ingest]
      summary: |
        Parse a known-customer time export (xlsx/pdf) into preview rows WITHOUT writing
        anything. Stashes the uploaded file in `ai_extract_samples` (24h TTL) so
        /confirm-customer-file can re-parse it on demand. Body is `multipart/form-data`
        with a single `file` field; the frontend builds the FormData manually.
      parameters:
        - $ref: "#/components/parameters/WeekStart"
      responses:
        "200":
          description: Parsed preview
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CustomerExtractPreview" }
        "400": { description: Could not detect or parse file }

  /weeks/{weekStart}/confirm-customer-file:
    post:
      operationId: confirmCustomerFile
      tags: [ingest]
      summary: |
        Commit a previously-extracted known-customer upload. Re-parses the stashed
        file by sampleId, drops any rows the dispatcher excluded by index, and runs
        the same wipe-and-reinsert tx as the legacy upload endpoint
        (`(week, source=Customer, customer=X, isManual=false)`).
      parameters:
        - $ref: "#/components/parameters/WeekStart"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ConfirmCustomerFileInput" }
      responses:
        "200":
          description: Ingest result
          content:
            application/json:
              schema: { $ref: "#/components/schemas/UploadResult" }
        "400": { description: Invalid input or stashed sample missing/expired }

  /weeks/{weekStart}/extract-customer-file/{sampleId}:
    delete:
      operationId: discardCustomerExtract
      tags: [ingest]
      summary: |
        Discard a stashed extract preview without committing. Called when
        the dispatcher cancels the preview dialog so the stashed bytes are
        purged immediately instead of waiting for the 24h TTL.
      parameters:
        - $ref: "#/components/parameters/WeekStart"
        - name: sampleId
          in: path
          required: true
          schema: { type: integer }
      responses:
        "204": { description: Discarded (or already gone) }

  /weeks/{weekStart}/customer-uploads:
    get:
      operationId: getCustomerUploadStatus
      tags: [ingest]
      summary: Per-customer upload status for a week
      parameters:
        - $ref: "#/components/parameters/WeekStart"
      responses:
        "200":
          description: Status list
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/CustomerUploadStatus" }

  /weeks/{weekStart}/extract-new-customer:
    post:
      operationId: extractNewCustomerFile
      tags: [ingest]
      summary: AI-extract punch rows from an unknown customer file (preview only — nothing persisted). Body is `multipart/form-data` with fields `file` and `customer`; the frontend builds the FormData manually.
      parameters:
        - $ref: "#/components/parameters/WeekStart"
      responses:
        "200":
          description: Extracted preview
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AiExtractPreview" }
        "400": { description: Could not extract rows }

  /weeks/{weekStart}/confirm-new-customer:
    post:
      operationId: confirmNewCustomerFile
      tags: [ingest]
      summary: Persist the dispatcher-confirmed rows + driver mapping for a new customer
      parameters:
        - $ref: "#/components/parameters/WeekStart"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ConfirmNewCustomerInput" }
      responses:
        "200":
          description: Import summary
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ConfirmNewCustomerResult" }
        "400": { description: Invalid input }

  /admin/ai-extract-samples:
    get:
      operationId: listAiExtractSamples
      tags: [ingest]
      summary: List stashed AI-extracted customer files (admin). One row per upload; engineers grab these as fixtures when promoting a customer to a deterministic parser.
      parameters:
        - name: customer
          in: query
          required: false
          schema: { type: string }
      responses:
        "200":
          description: Samples (most recent first)
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/AiExtractSample" }
        "403": { description: Admin only }

  /admin/ai-extract-samples/{id}/pin:
    patch:
      operationId: pinAiExtractSample
      tags: [ingest]
      summary: Pin or unpin an AI extract sample so the TTL cleanup skips it (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [pinned]
              properties:
                pinned: { type: boolean }
      responses:
        "200":
          description: Updated sample
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AiExtractSample" }
        "403": { description: Admin only }
        "404": { description: Sample not found }

  /admin/ai-extract-samples/{id}/download:
    get:
      operationId: downloadAiExtractSample
      tags: [ingest]
      summary: Download the original stashed file for an AI extract sample (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: File bytes
          content:
            application/octet-stream:
              schema: { type: string, format: binary }
        "403": { description: Admin only }
        "404": { description: Sample not found or expired }

  /admin/ai-extract-samples/{id}:
    delete:
      operationId: deleteAiExtractSample
      tags: [ingest]
      summary: Permanently delete a stashed AI extract sample (admin). Recorded in user_audit_log as `delete-ai-extract-sample`.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "204": { description: Deleted }
        "403": { description: Admin only }
        "404": { description: Sample not found }

  /customer-aliases:
    get:
      operationId: listCustomerNameAliases
      tags: [ingest]
      summary: List every saved (customer, nameOnDoc) → driver mapping (admin-only).
      responses:
        "200":
          description: Saved aliases joined with the resolved driver and the actor who last updated each one, plus the roster of available drivers for re-mapping.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CustomerNameAliasList" }
        "403": { description: Admin only }
    patch:
      operationId: updateCustomerNameAlias
      tags: [ingest]
      summary: Re-map a previously-saved alias to a different driver (admin-only).
      parameters:
        - name: customer
          in: query
          required: true
          schema: { type: string }
        - name: nameOnDoc
          in: query
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateCustomerNameAliasBody" }
      responses:
        "200":
          description: Updated alias.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CustomerNameAlias" }
        "400": { description: Invalid input }
        "403": { description: Admin only }
        "404": { description: Alias not found }
    delete:
      operationId: forgetCustomerNameAlias
      tags: [ingest]
      summary: Forget a previously-saved (customer, nameOnDoc) → kfiId mapping so the dispatcher can re-decide next time.
      parameters:
        - name: customer
          in: query
          required: true
          schema: { type: string }
        - name: nameOnDoc
          in: query
          required: true
          schema: { type: string }
      responses:
        "204": { description: Forgotten (or no alias existed) }
        "400": { description: Invalid input }

  /customer-aliases/audit-log:
    get:
      operationId: listCustomerAliasAuditLog
      tags: [ingest]
      summary: List recent re-map / forget actions on customer-driver aliases (admin-only).
      parameters:
        - name: limit
          in: query
          required: false
          schema: { type: integer, minimum: 1, maximum: 500 }
        - name: customer
          in: query
          required: false
          schema: { type: string }
        - name: nameOnDoc
          in: query
          required: false
          schema: { type: string }
      responses:
        "200":
          description: Audit entries (most recent first).
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/CustomerAliasAuditLogEntry" }
        "403": { description: Admin only }

  /parser-promotion-snoozes:
    get:
      operationId: listParserPromotionSnoozes
      tags: [ingest]
      summary: List every active or expired parser-promotion snooze (admin-only).
      responses:
        "200":
          description: Snoozes ordered by `snoozedAt` desc, joined with the actor email.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/ParserPromotionSnooze" }
        "403": { description: Admin only }
    post:
      operationId: createParserPromotionSnooze
      tags: [ingest]
      summary: Snooze the "promote to parser" suggestion for a customer (admin-only). Upserts the existing row when one is present.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateParserPromotionSnoozeBody" }
      responses:
        "200":
          description: Created or updated snooze.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ParserPromotionSnooze" }
        "400": { description: Invalid input }
        "403": { description: Admin only }
    delete:
      operationId: removeParserPromotionSnooze
      tags: [ingest]
      summary: Lift a snooze so the "promote to parser" suggestion can surface again (admin-only).
      parameters:
        - name: customer
          in: query
          required: true
          schema: { type: string }
      responses:
        "204": { description: Removed (or no snooze existed) }
        "400": { description: Invalid input }

  /driver-id-aliases:
    get:
      operationId: listDriverIdAliases
      tags: [ingest]
      summary: List every admin-managed customer-id → KFI driver mapping (admin-only).
      responses:
        "200":
          description: Saved driver-id aliases joined with the resolved driver, plus the active driver roster for the create/edit dropdowns.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DriverIdAliasList" }
        "403": { description: Admin only }
    post:
      operationId: createDriverIdAlias
      tags: [ingest]
      summary: Map a new customer payroll id (badge #, TELD code, etc.) to an existing KFI driver (admin-only).
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateDriverIdAliasBody" }
      responses:
        "200":
          description: Created (or updated, if the externalId already existed) alias.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DriverIdAlias" }
        "400": { description: Invalid input or unknown kfiId }
        "403": { description: Admin only }

  /driver-id-aliases/{externalId}:
    patch:
      operationId: updateDriverIdAlias
      tags: [ingest]
      summary: Re-map an existing alias to a different driver, or update its note (admin-only).
      parameters:
        - name: externalId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateDriverIdAliasBody" }
      responses:
        "200":
          description: Updated alias.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DriverIdAlias" }
        "400": { description: Invalid input }
        "403": { description: Admin only }
        "404": { description: Alias not found }
    delete:
      operationId: deleteDriverIdAlias
      tags: [ingest]
      summary: Remove a saved customer-id → driver mapping (admin-only).
      parameters:
        - name: externalId
          in: path
          required: true
          schema: { type: string }
      responses:
        "204": { description: Deleted (or no alias existed) }
        "403": { description: Admin only }

  /weeks/{weekStart}/manual-punches:
    post:
      operationId: createManualPunch
      tags: [punches]
      summary: Add a manual driver or customer punch
      parameters:
        - $ref: "#/components/parameters/WeekStart"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ManualPunchInput" }
      responses:
        "200":
          description: Created punch
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Punch" }
        "400": { description: Invalid input }

  /weeks/{weekStart}/preview-punch:
    post:
      operationId: previewPunch
      tags: [punches]
      summary: |
        Compute the projected daily / weekly RT/OT split for a draft (or
        edited) punch without persisting anything. Powers the live preview
        block in the Add-Manual-Punch dialog and the inline-edit recompute,
        so dispatchers see exactly what totals will become before saving.
      parameters:
        - $ref: "#/components/parameters/WeekStart"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PreviewPunchInput" }
      responses:
        "200":
          description: Preview totals
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PreviewPunchResult" }
        "400": { description: Invalid input }

  /punches/{id}:
    patch:
      operationId: editPunch
      tags: [punches]
      summary: Edit clock-in / clock-out / hours of an existing punch
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/EditPunchInput" }
      responses:
        "200":
          description: Updated punch
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Punch" }
        "404": { description: Not found }
    delete:
      operationId: deletePunch
      tags: [punches]
      summary: Delete a punch (manual or imported)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "204": { description: Deleted }

  /punches/{id}/reviewed:
    put:
      operationId: setPunchReviewed
      tags: [drivers]
      summary: Mark or unmark a single punch as reviewed
      description: |
        Per-punch review checkbox. Stamps `reviewedBy` / `reviewedAt` (or
        nulls them when `reviewed: false`). Returns the updated punch.
        Rejected with 423 when the driver-week is locked.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reviewed]
              properties:
                reviewed: { type: boolean }
      responses:
        "200":
          description: Updated punch
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Punch" }
        "404": { description: Not found }
        "423": { description: Driver-week is locked }

  /weeks/{weekStart}/reviewed/{kfiId}:
    put:
      operationId: setReviewed
      tags: [drivers]
      summary: Set the tri-state review status for a driver in a week
      description: |
        Pass either `{ status: 'good' | 'bad' | null }` (preferred) or the
        legacy `{ reviewed: boolean }` (true → good, false → null).
      parameters:
        - $ref: "#/components/parameters/WeekStart"
        - $ref: "#/components/parameters/KfiId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                reviewed: { type: boolean }
                status:
                  type: ["string", "null"]
      responses:
        "200":
          description: New review state
          content:
            application/json:
              schema:
                type: object
                required: [reviewed, status]
                properties:
                  reviewed: { type: boolean }
                  status:
                    type: ["string", "null"]

  /weeks/{weekStart}/drivers/{kfiId}/days/{date}/scale-hours:
    post:
      operationId: scaleDayHours
      tags: [punches]
      summary: |
        Set a per-day total by proportionally scaling each contributing
        punch's `hours` field. Lets the dispatcher type the Connecteam value
        directly on the daily total cell instead of hunting for the off-by-
        a-minute punch. Clock-in / clock-out are preserved; each scaled
        punch is marked `edited=true`. The day's prior `hours` total must be
        > 0 (we can't proportionally scale from zero).
      parameters:
        - $ref: "#/components/parameters/WeekStart"
        - $ref: "#/components/parameters/KfiId"
        - name: date
          in: path
          required: true
          description: Day to scale (YYYY-MM-DD, must be inside the week)
          schema: { type: string, pattern: "^\\d{4}-\\d{2}-\\d{2}$" }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ScaleDayHoursInput" }
      responses:
        "200":
          description: New per-day total after scaling
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DayHoursResult" }
        "400": { description: "Invalid input: no punches, prior total zero, or negative target" }
        "423": { description: Driver-week is locked }

  /weeks/{weekStart}/drivers/{kfiId}/days/{date}/reset-hours:
    post:
      operationId: resetDayHours
      tags: [punches]
      summary: |
        Revert each contributing punch's `hours` field back to the
        engine-derived `diffHours(clockIn, clockOut)` value, undoing a prior
        scale on that day. Clock times and the `edited` flag (which tracks
        clock-edits, not hours-edits) are left untouched.
      parameters:
        - $ref: "#/components/parameters/WeekStart"
        - $ref: "#/components/parameters/KfiId"
        - name: date
          in: path
          required: true
          schema: { type: string, pattern: "^\\d{4}-\\d{2}-\\d{2}$" }
      responses:
        "200":
          description: New per-day total after reset
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DayHoursResult" }
        "400": { description: Invalid input }
        "423": { description: Driver-week is locked }

  /weeks/{weekStart}/drivers/{kfiId}/lock:
    post:
      operationId: lockDriverWeek
      tags: [drivers]
      summary: Lock a driver-week (supervisor or admin only)
      parameters:
        - $ref: "#/components/parameters/WeekStart"
        - $ref: "#/components/parameters/KfiId"
      responses:
        "200":
          description: New lock state
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DriverWeekLockState" }
        "403": { description: Not a supervisor or admin }
    delete:
      operationId: unlockDriverWeek
      tags: [drivers]
      summary: Unlock a driver-week (supervisor or admin only)
      parameters:
        - $ref: "#/components/parameters/WeekStart"
        - $ref: "#/components/parameters/KfiId"
      responses:
        "200":
          description: New lock state
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DriverWeekLockState" }
        "403": { description: Not a supervisor or admin }

  /weeks/{weekStart}/drivers/{kfiId}/notes:
    get:
      operationId: listDriverNotes
      tags: [drivers]
      summary: List notes for a driver-week (newest first, excludes soft-deleted)
      parameters:
        - $ref: "#/components/parameters/WeekStart"
        - $ref: "#/components/parameters/KfiId"
      responses:
        "200":
          description: Notes for this driver-week
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/DriverNote" }
    post:
      operationId: createDriverNote
      tags: [drivers]
      summary: Append a new note to a driver-week (optionally tied to a punch)
      parameters:
        - $ref: "#/components/parameters/WeekStart"
        - $ref: "#/components/parameters/KfiId"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateDriverNoteInput" }
      responses:
        "200":
          description: Created note
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DriverNote" }
        "400": { description: Invalid input }

  /notes/{id}:
    delete:
      operationId: softDeleteDriverNote
      tags: [drivers]
      summary: Soft-delete a note (admin only). The row is kept for audit.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "204": { description: Soft-deleted }
        "403": { description: Admin access required }
        "404": { description: Not found }

  /notes/{id}/restore:
    post:
      operationId: restoreDriverNote
      tags: [drivers]
      summary: Restore a soft-deleted note (admin only). Clears `deleted_at` / `deleted_by_user_id` so the driver-detail page treats the note as live again. Recorded in `user_audit_log` as `restore-note`.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Restored note
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DriverNote" }
        "403": { description: Admin access required }
        "404": { description: Not found }
        "409": { description: Note is not currently soft-deleted }

  /admin/notes/deleted:
    get:
      operationId: listDeletedDriverNotes
      tags: [drivers]
      summary: List soft-deleted driver-week notes (admin only), newest first.
      parameters:
        - name: limit
          in: query
          required: false
          schema: { type: integer, minimum: 1, maximum: 500 }
      responses:
        "200":
          description: Hidden notes with author, hide-actor, and hide-time.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/DeletedDriverNote" }
        "403": { description: Admin access required }

  /admin/notes/hidden-unseen-count:
    get:
      operationId: getHiddenNotesUnseenCount
      tags: [drivers]
      summary: Number of notes hidden since this admin last viewed `/admin/notes`. Drives the "recently hidden" badge.
      responses:
        "200":
          description: Unseen count plus the timestamp the count is computed against.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/HiddenNotesUnseenCount" }
        "403": { description: Admin access required }

  /admin/notes/mark-hidden-seen:
    post:
      operationId: markHiddenNotesSeen
      tags: [drivers]
      summary: Stamp `notes_hidden_last_seen_at = now()` for the requesting admin so the unseen-count badge resets to zero.
      responses:
        "200":
          description: Updated unseen count (always 0 immediately after).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/HiddenNotesUnseenCount" }
        "403": { description: Admin access required }

  /weeks/{weekStart}/drivers/{kfiId}/audit:
    get:
      operationId: getDriverWeekAudit
      tags: [drivers]
      summary: Recent review/lock audit trail for a driver-week
      parameters:
        - $ref: "#/components/parameters/WeekStart"
        - $ref: "#/components/parameters/KfiId"
      responses:
        "200":
          description: Audit entries (newest first, max 50)
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/DriverWeekAuditEntry" }

components:
  parameters:
    WeekStart:
      name: weekStart
      in: path
      required: true
      description: Week start date (Sunday) in YYYY-MM-DD
      schema: { type: string, pattern: "^\\d{4}-\\d{2}-\\d{2}$" }
    KfiId:
      name: kfiId
      in: path
      required: true
      schema: { type: string }
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status: { type: string }

    AuthCredentials:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string, minLength: 8 }

    LoginCredentials:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string, minLength: 1 }

    User:
      type: object
      required: [id, email, createdAt, isAdmin, role, isActive, failedLoginCount, preferredLanguage]
      properties:
        id: { type: integer }
        email: { type: string }
        createdAt: { type: string, format: date-time }
        isAdmin: { type: boolean }
        role:
          type: string
          enum: [reviewer, supervisor]
        isActive: { type: boolean }
        failedLoginCount: { type: integer }
        lockedAt:
          type: ["string", "null"]
          format: date-time
        lastLoginAt:
          type: ["string", "null"]
          format: date-time
        passwordResetLastSentAt:
          type: ["string", "null"]
          format: date-time
          description: When the most recent admin-triggered password-reset email was sent. Drives the per-row Send-reset cooldown countdown in the admin UI.
        preferredLanguage:
          type: string
          description: BCP-47 language tag for the UI ('en' or 'es'). Defaults to 'en'.

    RegistrationStatus:
      type: object
      required: [openRegistration]
      properties:
        openRegistration: { type: boolean }

    MailerStatus:
      type: object
      required: [configured]
      properties:
        configured: { type: boolean }

    Invite:
      type: object
      required: [id, email, token, createdAt, expiresAt, createdByUserId]
      properties:
        id: { type: integer }
        email: { type: string }
        token: { type: string }
        createdByUserId: { type: integer }
        createdAt: { type: string, format: date-time }
        expiresAt: { type: string, format: date-time }
        usedAt:
          type: ["string", "null"]
          format: date-time
        lastSentAt:
          type: ["string", "null"]
          format: date-time
          description: When this invite was most recently re-emailed. Drives the per-row Resend cooldown countdown in the admin UI.

    InviteWithLink:
      allOf:
        - $ref: "#/components/schemas/Invite"
        - type: object
          required: [acceptUrl]
          properties:
            acceptUrl: { type: string }

    PublicInvite:
      type: object
      required: [email, expiresAt]
      properties:
        email: { type: string }
        expiresAt: { type: string, format: date-time }

    CreateInviteBody:
      type: object
      required: [email]
      properties:
        email: { type: string, format: email }

    AcceptInviteBody:
      type: object
      required: [token, password]
      properties:
        token: { type: string }
        password: { type: string, minLength: 8 }

    RequestPasswordResetBody:
      type: object
      required: [email]
      properties:
        email: { type: string, format: email }

    PasswordResetRequestResult:
      type: object
      required: [ok]
      properties:
        ok: { type: boolean }
        resetUrl:
          type: ["string", "null"]
          description: Only present in non-production environments to aid local testing.

    PublicPasswordReset:
      type: object
      required: [email, expiresAt]
      properties:
        email: { type: string }
        expiresAt: { type: string, format: date-time }

    ResetPasswordBody:
      type: object
      required: [token, password]
      properties:
        token: { type: string }
        password: { type: string, minLength: 8 }

    PasswordResetLink:
      type: object
      required: [resetUrl, expiresAt]
      properties:
        resetUrl: { type: string }
        expiresAt: { type: string, format: date-time }

    EmailDeliveryResult:
      type: object
      required: [delivered]
      properties:
        delivered: { type: boolean }

    ConnecteamTimeClock:
      type: object
      required: [id, name, isArchived, configured]
      properties:
        id: { type: integer }
        name: { type: string }
        isArchived: { type: boolean }
        configured:
          type: boolean
          description: Whether this clock is currently in TIME_CLOCKS and being pulled by refresh.

    ConnecteamClocksAudit:
      type: object
      required: [discovered, missing, configuredButMissingFromAccount]
      properties:
        discovered:
          type: array
          items: { $ref: "#/components/schemas/ConnecteamTimeClock" }
        missing:
          type: array
          description: Clocks that exist in Connecteam but aren't being pulled.
          items: { $ref: "#/components/schemas/ConnecteamTimeClock" }
        configuredButMissingFromAccount:
          type: array
          description: Clock IDs in TIME_CLOCKS that no longer exist in the account.
          items: { type: integer }

    RateLimitBucket:
      type: object
      required: [name, key, count, max, windowMs, resetAt, blocked]
      properties:
        name: { type: string }
        key: { type: string }
        count: { type: integer }
        max: { type: integer }
        windowMs: { type: integer }
        resetAt: { type: string, format: date-time }
        blocked: { type: boolean }

    RateLimitLockout:
      type: object
      required: [name, key, count, firstBlockedAt, lastBlockedAt]
      properties:
        name: { type: string }
        key: { type: string }
        count:
          type: integer
          description: Number of times this (limiter, key) pair was blocked in the window.
        firstBlockedAt: { type: string, format: date-time }
        lastBlockedAt: { type: string, format: date-time }

    SuggestedIpBlock:
      type: object
      required: [ip, lockoutCount, firstBlockedAt, lastBlockedAt, limiters]
      properties:
        ip: { type: string }
        lockoutCount:
          type: integer
          description: Number of distinct lockout events from this IP across all limiters in the window.
        firstBlockedAt: { type: string, format: date-time }
        lastBlockedAt: { type: string, format: date-time }
        limiters:
          type: array
          items: { type: string }
          description: Distinct limiter names this IP has tripped (e.g. login:ip, auth:request-reset).

    IpBlocklistEntry:
      type: object
      required: [ip, reason, createdAt, createdByEmail]
      properties:
        ip: { type: string }
        reason:
          type: ["string", "null"]
        createdAt: { type: string, format: date-time }
        createdByEmail:
          type: ["string", "null"]

    AddIpBlocklistBody:
      type: object
      required: [ip]
      properties:
        ip:
          type: string
          minLength: 1
          description: A single IPv4/IPv6 address (e.g. `203.0.113.7`) or a CIDR range (e.g. `203.0.113.0/24`, `2001:db8::/32`). Incoming requests matching the entry are rejected.
        reason:
          type: ["string", "null"]

    RateLimitLockoutTimeseriesPoint:
      type: object
      required: [day, name, count]
      properties:
        day:
          type: string
          description: UTC day boundary as `YYYY-MM-DD`.
        name: { type: string }
        count: { type: integer }

    RateLimitLockoutTopOffender:
      type: object
      required: [day, name, key, count, firstBlockedAt, lastBlockedAt]
      properties:
        day:
          type: string
          description: UTC day boundary as `YYYY-MM-DD`.
        name: { type: string }
        key: { type: string }
        count:
          type: integer
          description: Number of times this (limiter, key) pair was blocked on this day.
        firstBlockedAt: { type: string, format: date-time }
        lastBlockedAt: { type: string, format: date-time }

    RemoveIpBlocklistBody:
      type: object
      required: [ip]
      properties:
        ip:
          type: string
          minLength: 1
          description: The exact entry string (single IP or CIDR range) to remove from the blocklist.

    UserAuditLogEntry:
      type: object
      required: [id, action, createdAt]
      properties:
        id: { type: integer }
        action: { type: string }
        createdAt: { type: string, format: date-time }
        actorUserId:
          type: ["integer", "null"]
        actorEmail:
          type: ["string", "null"]
        targetUserId:
          type: ["integer", "null"]
        targetEmail:
          type: ["string", "null"]
        aiSample:
          description: Populated when `action` is `delete-ai-extract-sample`, `pin-ai-extract-sample`, or `unpin-ai-extract-sample`. Parsed from `targetEmail` so the UI can render a friendly label without re-parsing the synthetic string.
          type: ["object", "null"]
          required: [id, customer, fileName, weekStart]
          properties:
            id: { type: integer }
            customer: { type: string }
            fileName: { type: string }
            weekStart: { type: string, format: date }

    UpdateLanguageBody:
      type: object
      required: [preferredLanguage]
      properties:
        preferredLanguage:
          type: string
          enum: [en, es]

    UpdateUserBody:
      type: object
      properties:
        isActive: { type: boolean }
        isAdmin: { type: boolean }
        role:
          type: string
          enum: [reviewer, supervisor]
        locked:
          type: boolean
          description: Set false to clear an account lockout (admin unlock).

    DriverWeekLockState:
      type: object
      required: [locked]
      properties:
        locked: { type: boolean }
        lockedAt:
          type: ["string", "null"]
          format: date-time
        lockedByEmail:
          type: ["string", "null"]

    DriverWeekAuditEntry:
      type: object
      required: [id, action, createdAt]
      properties:
        id: { type: integer }
        action:
          type: string
          enum: [lock, unlock, review-good, review-bad, review-clear]
        createdAt: { type: string, format: date-time }
        actorUserId:
          type: ["integer", "null"]
        actorEmail:
          type: ["string", "null"]

    Week:
      type: object
      required: [startDate, endDate]
      properties:
        startDate: { type: string }
        endDate: { type: string }
        lastRefreshedAt:
          type: ["string", "null"]
          format: date-time
        driverCount: { type: integer }

    DriverInfo:
      type: object
      required: [kfiId, name, customer, isDriver]
      properties:
        kfiId: { type: string }
        name: { type: string }
        customer: { type: string }
        ctUserId:
          type: ["integer", "null"]
        isDriver: { type: boolean }

    DriverSummaryRow:
      type: object
      required:
        [
          kfiId,
          name,
          customer,
          driverHours,
          customerHours,
          totalHours,
          regularHours,
          overtimeHours,
          reviewed,
          hasOvertime,
          locked,
          noteCount,
        ]
      properties:
        kfiId: { type: string }
        name: { type: string }
        customer: { type: string }
        driverHours: { type: number }
        customerHours: { type: number }
        totalHours: { type: number }
        regularHours: { type: number }
        overtimeHours: { type: number }
        reviewed: { type: boolean }
        reviewStatus:
          type: ["string", "null"]
          enum: [good, bad, null]
        hasOvertime: { type: boolean }
        locked: { type: boolean }
        lockedByEmail:
          type: ["string", "null"]
        lastTouchedByEmail:
          type: ["string", "null"]
        lastTouchedAt:
          type: ["string", "null"]
          format: date-time
        noteCount:
          type: integer
          description: Number of non-deleted notes attached to this driver-week (both row-level and week-level). Surfaced as a small badge so a Supervisor can scan for context.

    WeekSummary:
      type: object
      required:
        [
          startDate,
          endDate,
          totals,
          rows,
          customers,
          lastRefreshedAt,
        ]
      properties:
        startDate: { type: string }
        endDate: { type: string }
        lastRefreshedAt:
          type: ["string", "null"]
          format: date-time
        lastRefreshedByEmail:
          type: ["string", "null"]
        totals:
          type: object
          required:
            [
              activeDrivers,
              driverHours,
              customerHours,
              totalHours,
              regularHours,
              overtimeHours,
              goodCount,
              badCount,
              lockedCount,
            ]
          properties:
            activeDrivers: { type: integer }
            driverHours: { type: number }
            customerHours: { type: number }
            totalHours: { type: number }
            regularHours: { type: number }
            overtimeHours: { type: number }
            goodCount: { type: integer }
            badCount: { type: integer }
            lockedCount: { type: integer }
        rows:
          type: array
          items: { $ref: "#/components/schemas/DriverSummaryRow" }
        customers:
          type: array
          items:
            type: object
            required: [customer, drivers]
            properties:
              customer: { type: string }
              drivers:
                type: array
                items: { $ref: "#/components/schemas/DriverSummaryRow" }

    Punch:
      type: object
      required:
        [
          id,
          weekStart,
          kfiId,
          source,
          date,
          clockIn,
          clockOut,
          hours,
          dispTz,
          isManual,
        ]
      properties:
        id: { type: integer }
        weekStart: { type: string }
        kfiId: { type: string }
        customer:
          type: ["string", "null"]
        source:
          type: string
          enum: [Driver, Customer]
        date: { type: string }
        clockIn: { type: string }
        clockOut: { type: string }
        hours: { type: number }
        payType:
          type: ["string", "null"]
        dispTz: { type: string }
        isManual: { type: boolean }
        edited: { type: boolean }
        createdByEmail:
          type: ["string", "null"]
        updatedByEmail:
          type: ["string", "null"]
        updatedAt:
          type: ["string", "null"]
          format: date-time
        reviewed: { type: boolean }
        reviewedAt:
          type: ["string", "null"]
          format: date-time
        reviewedByEmail:
          type: ["string", "null"]

    DailyTotals:
      type: object
      required:
        [
          date,
          driverHours,
          customerHours,
          totalHours,
          regularHours,
          overtimeHours,
        ]
      properties:
        date: { type: string }
        driverHours: { type: number }
        customerHours: { type: number }
        totalHours: { type: number }
        regularHours: { type: number }
        overtimeHours: { type: number }

    Check:
      type: object
      required: [level, message]
      properties:
        level:
          type: string
          enum: [info, warn, error]
        message: { type: string }
        date:
          type: ["string", "null"]

    DriverWeek:
      type: object
      required:
        [
          driver,
          weekStart,
          endDate,
          punches,
          dailyTotals,
          totals,
          checks,
          reviewed,
        ]
      properties:
        driver: { $ref: "#/components/schemas/DriverInfo" }
        weekStart: { type: string }
        endDate: { type: string }
        punches:
          type: array
          items: { $ref: "#/components/schemas/Punch" }
        dailyTotals:
          type: array
          items: { $ref: "#/components/schemas/DailyTotals" }
        totals:
          type: object
          required:
            [
              driverHours,
              customerHours,
              totalHours,
              regularHours,
              overtimeHours,
              driverRt,
              driverOt,
              custRt,
              custOt,
            ]
          properties:
            driverHours: { type: number }
            customerHours: { type: number }
            totalHours: { type: number }
            regularHours: { type: number }
            overtimeHours: { type: number }
            driverRt: { type: number }
            driverOt: { type: number }
            custRt: { type: number }
            custOt: { type: number }
        checks:
          type: array
          items: { $ref: "#/components/schemas/Check" }
        reviewed: { type: boolean }
        reviewStatus:
          type: ["string", "null"]
          enum: [good, bad, null]
        locked: { type: boolean }
        lockedAt:
          type: ["string", "null"]
          format: date-time
        lockedByEmail:
          type: ["string", "null"]
        connecteamParity:
          type: object
          description: |
            Per-day comparison of the engine's daily totals against the
            Connecteam-side daily totals snapshotted at the most recent
            /refresh-connecteam call for this driver-week. `status` is
            `unknown` when no snapshot exists yet (driver-week never
            refreshed), `match` when every snapshotted day reconciles
            within 0.005h, and `differ` otherwise.
          required: [status, diffCount, days]
          properties:
            status:
              type: string
              enum: [match, differ, unknown]
            diffCount: { type: integer }
            lastRefreshedAt:
              type: ["string", "null"]
              format: date-time
            days:
              type: array
              items:
                type: object
                required: [date, engineHours, connecteamHours, matches]
                properties:
                  date: { type: string }
                  engineHours: { type: number }
                  connecteamHours:
                    type: ["number", "null"]
                  matches:
                    type: ["boolean", "null"]

    PreviewPunchInput:
      type: object
      required: [kfiId, source, date, clockIn, clockOut]
      description: |
        Draft punch the dispatcher is about to add or edit. Treated as a
        "what-if" — no DB writes happen. When `excludePunchId` is set, the
        existing punch with that id is removed from the punch list before
        the preview is folded in (i.e. inline-edit recompute).
      properties:
        kfiId: { type: string }
        source:
          type: string
          enum: [Driver, Customer]
        customer:
          type: ["string", "null"]
        date: { type: string, pattern: "^\\d{4}-\\d{2}-\\d{2}$" }
        clockIn: { type: string }
        clockOut: { type: string }
        excludePunchId:
          type: ["integer", "null"]
        dispTz:
          type: ["string", "null"]

    PreviewPunchResult:
      type: object
      required:
        [
          normalizedClockIn,
          normalizedClockOut,
          hours,
          dailyTotalAfter,
          weekly,
          overlaps,
          valid,
        ]
      properties:
        valid:
          type: boolean
          description: True when both clock-in and clock-out parsed and clockOut > clockIn.
        invalidReason:
          type: ["string", "null"]
        normalizedClockIn: { type: string }
        normalizedClockOut: { type: string }
        hours: { type: number }
        dailyTotalAfter:
          type: object
          required: [date, driverHours, customerHours, totalHours]
          properties:
            date: { type: string }
            driverHours: { type: number }
            customerHours: { type: number }
            totalHours: { type: number }
        weekly:
          type: object
          required:
            [
              driverHours,
              customerHours,
              totalHours,
              regularHours,
              overtimeHours,
              driverRt,
              driverOt,
              custRt,
              custOt,
            ]
          properties:
            driverHours: { type: number }
            customerHours: { type: number }
            totalHours: { type: number }
            regularHours: { type: number }
            overtimeHours: { type: number }
            driverRt: { type: number }
            driverOt: { type: number }
            custRt: { type: number }
            custOt: { type: number }
        overlaps:
          type: array
          description: |
            Existing same-source punches whose [clockIn, clockOut] window
            intersects the preview by more than 10 minutes. Surfaced as a
            warning in the dialog with a "View overlap" link.
          items:
            type: object
            required: [id, source, date, clockIn, clockOut, overlapMinutes]
            properties:
              id: { type: integer }
              source:
                type: string
                enum: [Driver, Customer]
              date: { type: string }
              clockIn: { type: string }
              clockOut: { type: string }
              overlapMinutes: { type: number }

    ScaleDayHoursInput:
      type: object
      required: [totalHours]
      properties:
        totalHours:
          type: number
          minimum: 0
          description: |
            New per-day total to scale to. Must be >= 0 and <= 24. The
            existing per-punch `hours` values are scaled by
            `totalHours / currentDayTotal`; any rounding residue is folded
            into the largest punch so the sum lands exactly on the target.

    DayHoursResult:
      type: object
      required: [date, totalHours, punches]
      properties:
        date: { type: string }
        totalHours: { type: number }
        punches:
          type: array
          items: { $ref: "#/components/schemas/Punch" }

    ManualPunchInput:
      type: object
      required: [kfiId, source, date, clockIn, clockOut]
      properties:
        kfiId: { type: string }
        source:
          type: string
          enum: [Driver, Customer]
        customer:
          type: ["string", "null"]
        date: { type: string, pattern: "^\\d{4}-\\d{2}-\\d{2}$" }
        clockIn: { type: string }
        clockOut: { type: string }
        payType:
          type: ["string", "null"]
        dispTz:
          type: ["string", "null"]

    EditPunchInput:
      type: object
      properties:
        clockIn:
          type: ["string", "null"]
        clockOut:
          type: ["string", "null"]

    RefreshResult:
      type: object
      required: [driversFound, punchesUpserted, refreshedAt]
      properties:
        driversFound: { type: integer }
        punchesUpserted: { type: integer }
        refreshedAt: { type: string, format: date-time }

    UploadResult:
      type: object
      required: [customer, punchesUpserted, fileName, unmappedIds]
      properties:
        customer: { type: string }
        fileName: { type: string }
        punchesUpserted: { type: integer }
        skipped:
          type: boolean
          description: |
            True when the uploaded file's SHA-256 matched the most recent
            successful import for this (week, customer) and the server
            short-circuited without re-parsing or re-writing punches.
            Bulk-upload uses this to render "Already up to date" instead of
            re-importing identical files. Per-row Re-upload bypasses the
            check by sending `?force=1`.
        unmappedIds:
          type: array
          description: |
            Badge / employee IDs that appeared in the uploaded file but could
            not be mapped to a known KFI driver. Surfaced as a non-blocking
            warning so dispatchers know punches were dropped (e.g. a new hire
            who hasn't been added to the mapping yet). `sampleName` carries
            the driver name as it appeared next to the id in the source file
            (when the parser could see one), so admins can recognize who an
            unknown id belongs to without opening the file.
          items:
            $ref: "#/components/schemas/UnmappedId"

    UnmappedId:
      type: object
      required: [id, count, sampleName]
      properties:
        id: { type: string }
        count:
          type: integer
          description: Number of rows in the file that referenced this id and were dropped.
        sampleName:
          type: ["string", "null"]
          description: Driver name as printed next to the id in the source file, when available.

    CustomerUploadStatus:
      type: object
      required: [customer, extensions, keywords, punchCount, isAiImported, aiImportWeekCount, aliasCount, promotionCandidate, lastUnmappedIds]
      properties:
        customer: { type: string }
        extensions:
          type: array
          items: { type: string }
        keywords:
          type: array
          items: { type: string }
          description: Lowercase filename substrings that route a file to this customer's parser. Empty for AI-only customers (no deterministic parser yet).
        punchCount: { type: integer }
        isAiImported:
          type: boolean
          description: True when this customer has no deterministic parser and has only ever been imported via the AI extract flow.
        aiImportWeekCount:
          type: integer
          description: Number of distinct weeks this customer has been imported via the AI extract flow (counted across all time). Used to surface promotion candidates.
        aliasCount:
          type: integer
          description: Number of saved driver-name aliases for this customer in `customer_name_aliases`. A growing count is a strong signal that the customer is a recurring weekly run rather than a one-off, and is a good prompt to promote the AI flow to a deterministic parser.
        promotionCandidate:
          type: boolean
          description: True when this customer crosses the heuristic threshold for being promoted to a deterministic parser — currently `aiImportWeekCount >= 3` or `aliasCount >= 5`. Surfaced as a banner on the dashboard with a link to `docs/promote-ai-customer-to-parser.md`.
        lastUploadAt:
          type: ["string", "null"]
          format: date-time
        lastFileName:
          type: ["string", "null"]
        lastAttemptAt:
          type: ["string", "null"]
          format: date-time
          description: Timestamp of the most recent upload attempt (success or failure).
        lastSuccessAt:
          type: ["string", "null"]
          format: date-time
          description: Timestamp of the most recent successful upload, if any.
        lastError:
          type: ["string", "null"]
          description: Error message from the last upload attempt, or null if the last attempt succeeded.
        lastSource:
          type: ["string", "null"]
          description: Where the last attempt came from — "parser" (known-customer route) or "ai" (new-customer flow).
        lastUnmappedIds:
          type: array
          items:
            $ref: "#/components/schemas/UnmappedId"
          description: |
            Badge / employee IDs that appeared in the most recent successful
            upload but didn't map to a known KFI driver. Surfaced as a
            persistent warning under the row so dispatchers don't lose the
            list when refreshing the dashboard. Empty when the last upload
            was clean.

    CustomerExtractRow:
      type: object
      required: [index, sourceRow, kfiId, date, clockIn, clockOut, hours]
      properties:
        index:
          type: integer
          description: Stable position in the parser's deterministic output. Pass back in `excludedIndices` on /confirm-customer-file to drop this row.
        sourceRow:
          type: string
          description: Human-readable hint identifying where this row came from in the uploaded file (e.g. `row 3 of Adient.xlsx`). Surfaced in the preview so dispatchers can cross-check against the original document.
        kfiId: { type: string }
        driverName:
          type: ["string", "null"]
        date: { type: string }
        clockIn: { type: string }
        clockOut: { type: string }
        hours: { type: number }
        payType:
          type: ["string", "null"]

    CustomerExtractPreview:
      type: object
      required:
        [
          customer,
          fileName,
          weekStart,
          sampleId,
          rows,
          unmappedIds,
          existingPunchCount,
        ]
      properties:
        customer: { type: string }
        fileName: { type: string }
        weekStart: { type: string }
        sampleId:
          type: integer
          description: ID of the stashed copy of the uploaded file. Pass back to /confirm-customer-file so the same bytes are re-parsed and committed.
        rows:
          type: array
          items: { $ref: "#/components/schemas/CustomerExtractRow" }
        unmappedIds:
          type: array
          items: { $ref: "#/components/schemas/UnmappedId" }
        existingPunchCount:
          type: integer
          description: Number of existing Customer-source punches for `(week, customer)` that this confirm would actually replace — i.e. excluding manual rows, inline-edited rows, and any rows belonging to a locked driver-week (all of which the wipe preserves).

    ConfirmCustomerFileInput:
      type: object
      required: [customer, sampleId]
      properties:
        customer: { type: string, minLength: 1 }
        sampleId: { type: integer }
        excludedIndices:
          type: array
          items: { type: integer, minimum: 0 }
          description: Stable indices from the preview's `rows` array that the dispatcher chose to exclude.

    AiExtractedRow:
      type: object
      required: [driverNameOnDoc, date]
      properties:
        driverNameOnDoc: { type: string }
        badgeOrId:
          type: ["string", "null"]
        date: { type: string }
        timeIn:
          type: ["string", "null"]
        timeOut:
          type: ["string", "null"]
        hours:
          type: ["number", "null"]

    DriverMatch:
      type: object
      required: [kfiId, name, customer, confidence]
      properties:
        kfiId: { type: string }
        name: { type: string }
        customer: { type: string }
        confidence: { type: number }

    DriverNameSuggestion:
      type: object
      required: [driverNameOnDoc, matches]
      properties:
        driverNameOnDoc: { type: string }
        badgeOrId:
          type: ["string", "null"]
        savedKfiId:
          type: ["string", "null"]
          description: A previously-saved alias for this (customer, name) pair, if any. The frontend uses it to pre-select the dropdown.
        matches:
          type: array
          items: { $ref: "#/components/schemas/DriverMatch" }

    AiExtractPreview:
      type: object
      required: [customer, weekStart, rows, suggestions, sampleId]
      properties:
        customer: { type: string }
        weekStart: { type: string }
        rows:
          type: array
          items: { $ref: "#/components/schemas/AiExtractedRow" }
        suggestions:
          type: array
          items: { $ref: "#/components/schemas/DriverNameSuggestion" }
        sampleId:
          type: integer
          description: ID of the stashed copy of the uploaded file. Pass back to /confirm-new-customer so the sample is marked confirmed and retained for engineer use.

    ConfirmNewCustomerRow:
      type: object
      required: [driverNameOnDoc, date, clockIn, clockOut]
      properties:
        driverNameOnDoc: { type: string }
        date: { type: string, pattern: "^\\d{4}-\\d{2}-\\d{2}$" }
        clockIn: { type: string }
        clockOut: { type: string }
        hours:
          type: ["number", "null"]

    ConfirmNewCustomerInput:
      type: object
      required: [customer, mapping, rows]
      properties:
        customer: { type: string, minLength: 1 }
        sampleId:
          type: ["integer", "null"]
          description: ID returned by /extract-new-customer. When provided, the matching stashed file is marked as confirmed (retained 90 days for engineer fixture use).
        mapping:
          type: object
          additionalProperties:
            type: ["string", "null"]
        rows:
          type: array
          items: { $ref: "#/components/schemas/ConfirmNewCustomerRow" }

    ConfirmNewCustomerResult:
      type: object
      required: [customer, imported, skippedUnmapped, unmappedNames]
      properties:
        customer: { type: string }
        imported: { type: integer }
        skippedUnmapped: { type: integer }
        unmappedNames:
          type: array
          items: { type: string }

    AiExtractSample:
      type: object
      required:
        [
          id,
          weekStart,
          customer,
          fileName,
          mimeType,
          sizeBytes,
          uploadedAt,
          expiresAt,
          confirmed,
          pinned,
        ]
      properties:
        id: { type: integer }
        weekStart: { type: string }
        customer: { type: string }
        fileName: { type: string }
        mimeType: { type: string }
        sizeBytes: { type: integer }
        uploadedAt: { type: string, format: date-time }
        expiresAt: { type: string, format: date-time }
        confirmedAt:
          type: ["string", "null"]
          format: date-time
        confirmed: { type: boolean }
        pinned: { type: boolean }
        uploadedByEmail:
          type: ["string", "null"]

    CustomerNameAlias:
      type: object
      required: [customer, nameOnDoc, kfiId, updatedAt, weeksUsedCount]
      properties:
        customer: { type: string }
        nameOnDoc: { type: string }
        kfiId: { type: string }
        driverName:
          type: ["string", "null"]
          description: Name from the drivers table for this kfiId, or null if the driver no longer exists.
        driverCustomer:
          type: ["string", "null"]
        driverIsArchived:
          type: ["boolean", "null"]
        updatedAt: { type: string, format: date-time }
        updatedByEmail:
          type: ["string", "null"]
        lastUsedWeek:
          type: ["string", "null"]
          description: Most recent week_start (YYYY-MM-DD) of a Customer-source punch where (customer, kfiId) matches this alias, or null if never seen.
        weeksUsedCount:
          type: integer
          description: Distinct count of week_start values where this alias's (customer, kfiId) appeared in Customer-source punches.

    CustomerNameAliasList:
      type: object
      required: [aliases, drivers]
      properties:
        aliases:
          type: array
          items: { $ref: "#/components/schemas/CustomerNameAlias" }
        drivers:
          type: array
          items: { $ref: "#/components/schemas/DriverInfo" }

    UpdateCustomerNameAliasBody:
      type: object
      required: [kfiId]
      properties:
        kfiId: { type: string, minLength: 1 }

    ParserPromotionSnooze:
      type: object
      required: [customer, snoozedAt]
      properties:
        customer: { type: string }
        snoozedAt: { type: string, format: date-time }
        snoozedUntil:
          type: ["string", "null"]
          format: date-time
          description: When the snooze auto-expires. Null means snoozed indefinitely.
        snoozedByEmail:
          type: ["string", "null"]
        reason:
          type: ["string", "null"]

    CreateParserPromotionSnoozeBody:
      type: object
      required: [customer]
      properties:
        customer: { type: string, minLength: 1 }
        snoozeWeeks:
          type: ["integer", "null"]
          minimum: 1
          maximum: 520
          description: Number of weeks to snooze the suggestion for. Null or omitted = snooze indefinitely (until manually un-snoozed).
        reason:
          type: ["string", "null"]
          maxLength: 500

    DriverIdAlias:
      type: object
      required: [externalId, kfiId, createdAt, updatedAt]
      properties:
        externalId: { type: string }
        kfiId: { type: string }
        customer:
          type: ["string", "null"]
          description: Optional context — which customer file this id was first seen in.
        sampleName:
          type: ["string", "null"]
          description: Optional context — sample name-on-doc captured when the alias was created (helps later reviewers recognise it).
        note:
          type: ["string", "null"]
        driverName:
          type: ["string", "null"]
          description: Name from the drivers table for this kfiId, or null if the driver no longer exists.
        driverCustomer:
          type: ["string", "null"]
        driverIsArchived:
          type: ["boolean", "null"]
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        createdByEmail:
          type: ["string", "null"]
        updatedByEmail:
          type: ["string", "null"]

    DriverIdAliasList:
      type: object
      required: [aliases, drivers]
      properties:
        aliases:
          type: array
          items: { $ref: "#/components/schemas/DriverIdAlias" }
        drivers:
          type: array
          items: { $ref: "#/components/schemas/DriverInfo" }

    CreateDriverIdAliasBody:
      type: object
      required: [externalId, kfiId]
      properties:
        externalId: { type: string, minLength: 1 }
        kfiId: { type: string, minLength: 1 }
        customer:
          type: ["string", "null"]
        sampleName:
          type: ["string", "null"]
        note:
          type: ["string", "null"]

    UpdateDriverIdAliasBody:
      type: object
      properties:
        kfiId: { type: string, minLength: 1 }
        customer:
          type: ["string", "null"]
        sampleName:
          type: ["string", "null"]
        note:
          type: ["string", "null"]

    DriverNote:
      type: object
      required:
        [
          id,
          weekStart,
          kfiId,
          body,
          authorRole,
          createdAt,
          punchExists,
        ]
      properties:
        id: { type: integer }
        weekStart: { type: string }
        kfiId: { type: string }
        punchId:
          type: ["integer", "null"]
          description: Null = week-level note. Otherwise references the punch this note is attached to. Note that the FK is intentionally denormalized — if the punch is later deleted, this column stays set and the note renders with an "(orphaned punch)" tag so context isn't lost.
        punchExists:
          type: boolean
          description: False when `punchId` is set but the punch row has been deleted. The frontend uses this to render an "(orphaned punch)" tag.
        body: { type: string }
        authorUserId:
          type: ["integer", "null"]
        authorEmail:
          type: ["string", "null"]
        authorRole:
          type: string
          description: Snapshot of the author's role at write-time ("reviewer" / "supervisor" / "admin"). Denormalized so changing the author's role later doesn't retroactively rewrite history.
        createdAt: { type: string, format: date-time }
        lastHiddenAt:
          type: ["string", "null"]
          format: date-time
          description: When this note was most recently soft-deleted, or null if it has never been hidden. Persists across restore so the driver-detail panel can render a "previously hidden by …" audit tag (admin viewers only) on restored notes.
        lastHiddenByEmail:
          type: ["string", "null"]
          description: Email of the admin who most recently hid this note. Persists across restore. Null when the note has never been hidden or the hide-actor's user row has been deleted.

    CreateDriverNoteInput:
      type: object
      required: [body]
      properties:
        body: { type: string, minLength: 1, maxLength: 5000 }
        punchId:
          type: ["integer", "null"]
          description: Optional. When set, the note is attached to that specific punch row. When omitted/null, the note is week-level.

    DeletedDriverNote:
      type: object
      required:
        [
          id,
          weekStart,
          kfiId,
          body,
          authorRole,
          createdAt,
          deletedAt,
          punchExists,
        ]
      properties:
        id: { type: integer }
        weekStart: { type: string }
        kfiId: { type: string }
        punchId:
          type: ["integer", "null"]
        punchExists:
          type: boolean
          description: False when `punchId` is set but the punch row has been deleted.
        body: { type: string }
        authorUserId:
          type: ["integer", "null"]
        authorEmail:
          type: ["string", "null"]
        authorRole:
          type: string
        createdAt: { type: string, format: date-time }
        deletedAt: { type: string, format: date-time }
        deletedByUserId:
          type: ["integer", "null"]
        deletedByEmail:
          type: ["string", "null"]

    HiddenNotesUnseenCount:
      type: object
      required: [count, lastSeenAt]
      properties:
        count:
          type: integer
          description: Number of currently-hidden notes whose `deleted_at` is newer than this admin's `notes_hidden_last_seen_at`. Drives the "recently hidden" badge.
        lastSeenAt:
          type: ["string", "null"]
          format: date-time
          description: When this admin last viewed the hidden-notes page (or null if they never have).

    CustomerAliasAuditLogEntry:
      type: object
      required: [id, action, customer, nameOnDoc, createdAt]
      properties:
        id: { type: integer }
        action:
          type: string
          description: One of `remap` (driver re-assigned) or `forget` (alias deleted).
        customer: { type: string }
        nameOnDoc: { type: string }
        beforeKfiId:
          type: ["string", "null"]
        afterKfiId:
          type: ["string", "null"]
        beforeDriverName:
          type: ["string", "null"]
        afterDriverName:
          type: ["string", "null"]
        actorUserId:
          type: ["integer", "null"]
        actorEmail:
          type: ["string", "null"]
        createdAt: { type: string, format: date-time }
